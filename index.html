let CU=null,CR=null,CS=null;
let aData={},aTgt={},roTgt={},uploads=[],pdfCtrl={Q1:false,Q2:false,Q3:false,Q4:false};

// ===== DB =====
async function dbGet(tbl,filters={}){
  let url=`${SB}/rest/v1/${tbl}?`;
  url+=Object.entries(filters).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join('&');
  const r=await fetch(url,{headers:{apikey:SK,Authorization:`Bearer ${SK}`}});
  return r.json();
}
async function dbUpsert(tbl,rows){
  const r=await fetch(`${SB}/rest/v1/${tbl}`,{method:'POST',headers:{apikey:SK,Authorization:`Bearer ${SK}`,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates'},body:JSON.stringify(rows)});
  return r.ok;
}

async function loadAll(){
  const[dr,tr,ur,sr]=await Promise.all([
    dbGet('bar1_data'),dbGet('bar1_targets'),dbGet('bar1_uploads'),
    (async()=>{try{return await dbGet('bar1_data',{sdo_code:'SETTINGS'})}catch{return[]}})()
  ]);
  aData={};aTgt={};roTgt={};
  SDOS.forEach(s=>{aData[s]={};aTgt[s]={};QS.forEach(q=>{aData[s][q]={};aTgt[s][q]={}})});
  QS.forEach(q=>roTgt[q]={});
  (Array.isArray(dr)?dr:[]).forEach(r=>{
    if(r.sdo_code==='SETTINGS')return;
    if(aData[r.sdo_code]&&aData[r.sdo_code][r.quarter]!==undefined)aData[r.sdo_code][r.quarter][r.field_key]=r.field_value;
  });
  (Array.isArray(tr)?tr:[]).forEach(r=>{
    if(r.sdo_code==='RO'){if(roTgt[r.quarter])roTgt[r.quarter][r.field_key]=r.field_value}
    else if(aTgt[r.sdo_code]&&aTgt[r.sdo_code][r.quarter]!==undefined)aTgt[r.sdo_code][r.quarter][r.field_key]=r.field_value;
  });
  uploads=Array.isArray(ur)?ur:[];
  const sa=Array.isArray(sr)?sr:[];
  QS.forEach(q=>{const s=sa.find(r=>r.quarter==='global'&&r.field_key===`pdf_upload_${q}`);pdfCtrl[q]=s?s.field_value===1:false});
}

// ===== LOGIN =====
function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase();
  const p=document.getElementById('lp').value;
  const a=ACCTS[u];
  if(!a||a.pw!==p){document.getElementById('lErr').style.display='block';return}
  document.getElementById('lErr').style.display='none';
  CU=u;CR=a.role;CS=a.role==='sdo'?u:null;
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appShell').style.display='block';
  document.getElementById('uBadge').textContent=a.name;
  init();
}
function doLogout(){
  CU=CR=CS=null;
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('appShell').style.display='none';
  document.getElementById('lu').value='';document.getElementById('lp').value='';
  document.getElementById('sdoTabs').style.display='none';
  document.getElementById('adminTabs').style.display='none';
}
document.addEventListener('keypress',e=>{if(e.key==='Enter')doLogin()});

// ===== TABS =====
function showTab(e,role,tab){
  document.querySelectorAll(`#${role}Tabs .tab-btn`).forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  document.querySelectorAll(`#${role}Tabs .tab-content`).forEach(c=>c.classList.remove('active'));
  const el=document.getElementById(`tab-${role}-${tab}`);
  if(el){el.classList.add('active');loadAll().then(()=>render(role,tab))}
}
function render(role,tab){
  if(role==='sdo'){
    if(tab==='encode')rSDOEnc();
    else if(tab==='summary')rSDOSum();
    else if(tab==='regional')rSDOReg();
  }else{
    if(tab==='dashboard')rAdmDash();
    else if(tab==='submissions')rAdmSubs();
    else if(tab==='consolidated')rAdmCon();
    else if(tab==='edit')rAdmEdit();
    else if(tab==='rotargets')rAdmROT();
    else if(tab==='pdfs')rAdmPDFs();
    else if(tab==='pdfctrl')rAdmPDFCtrl();
  }
}

async function init(){
  if(CR==='sdo'){
    document.getElementById('sdoTabs').style.display='block';
    document.getElementById('tab-sdo-encode').innerHTML='<div class="loading"><div class="spinner"></div><p style="margin-top:12px">Loading...</p></div>';
    await loadAll();rSDOEnc();
  }else{
    document.getElementById('adminTabs').style.display='block';
    document.getElementById('tab-admin-dashboard').innerHTML='<div class="loading"><div class="spinner"></div><p style="margin-top:12px">Loading...</p></div>';
    await loadAll();rAdmDash();
  }
}

// ===== HELPERS =====
function sumI(k,q){return SDOS.reduce((s,sd)=>s+(parseFloat(aData[sd]?.[q]?.[k])||0),0)}
function avgI(k,q){const vs=SDOS.map(sd=>aData[sd]?.[q]?.[k]).filter(v=>v!==undefined&&v!==null);return vs.length?vs.reduce((a,b)=>a+parseFloat(b),0)/vs.length:null}
function dispI(k,q,isPct){if(isPct){const v=avgI(k,q);return v===null?'—':v.toFixed(2)+'%'}else{const v=sumI(k,q);return v===0&&!SDOS.some(s=>aData[s]?.[q]?.[k]!==undefined)?'—':v.toLocaleString()}}

function indRow(ind,t,a,editable,tId,aId){
  let vHtml='—',vCls='vn';
  if(t!==undefined&&t!==''&&t!==null&&a!==undefined&&a!==''&&a!==null){
    const d=parseFloat(a)-parseFloat(t);
    vHtml=(d>=0?'+':'')+d.toFixed(2)+(ind.u||'');
    vCls=d>=0?'vm':'vx';
  }
  if(editable){
    return `<tr>
      <td>${ind.l}</td>
      <td style="text-align:center"><input class="num-input t-input" type="number" step="any" id="${tId}" value="${t!==undefined&&t!==null?t:''}" placeholder="—"></td>
      <td style="text-align:center"><input class="num-input a-input" type="number" step="any" id="${aId}" value="${a!==undefined&&a!==null?a:''}" placeholder="—"></td>
      <td style="text-align:center" class="${vCls}" id="var_${tId.slice(2)}">${vHtml}</td>
    </tr>`;
  }else{
    return `<tr>
      <td>${ind.l}</td>
      <td style="text-align:center">${t!==undefined&&t!==null?t:'—'}</td>
      <td style="text-align:center;font-weight:600">${a!==undefined&&a!==null?a:'—'}</td>
      <td style="text-align:center" class="${vCls}">${vHtml}</td>
    </tr>`;
  }
}

function indTableHeader(editable){
  return `<thead><tr>
    <th style="min-width:300px">Indicator</th>
    <th style="text-align:center;min-width:100px;background:#b7791f">Target</th>
    <th style="text-align:center;min-width:100px;background:#276749">Accomplishment</th>
    <th style="text-align:center;min-width:90px">Variance</th>
  </tr></thead>`;
}

function buildFullIndTable(getTgt,getAcm,editable,tPfx,aPfx){
  let h=`<div style="overflow-x:auto"><table class="ind-table">${indTableHeader(editable)}<tbody>`;
  PROGRAMS.forEach(p=>{
    h+=`<tr class="prog-row"><td colspan="4" style="background:${p.color}">${p.name}</td></tr>`;
    p.ind.forEach(ind=>{
      const t=getTgt(ind.k),a=getAcm(ind.k);
      h+=indRow(ind,t,a,editable,`${tPfx}${ind.k}`,`${aPfx}${ind.k}`);
    });
  });
  return h+'</tbody></table></div>';
}

async function saveRows(sdoCode,q,tPfx,aPfx,msgId){
  const msg=document.getElementById(msgId);
  if(msg)msg.innerHTML='<div class="alert al-i">Saving to cloud...</div>';
  const ar=[],tr=[];
  PROGRAMS.forEach(p=>p.ind.forEach(i=>{
    const tv=document.getElementById(`${tPfx}${i.k}`)?.value;
    const av=document.getElementById(`${aPfx}${i.k}`)?.value;
    if(tv!==undefined&&tv!=='')tr.push({sdo_code:sdoCode,quarter:q,field_key:i.k,field_value:parseFloat(tv)});
    if(av!==undefined&&av!=='')ar.push({sdo_code:sdoCode,quarter:q,field_key:i.k,field_value:parseFloat(av)});
  }));
  try{
    if(ar.length)await dbUpsert('bar1_data',ar);
    if(tr.length)await dbUpsert('bar1_targets',tr);
    if(msg)msg.innerHTML='<div class="alert al-s">✅ Saved to cloud successfully!</div>';
    await loadAll();
    setTimeout(()=>{if(msg)msg.innerHTML=''},3000);
    return true;
  }catch(e){
    if(msg)msg.innerHTML='<div class="alert al-d">❌ Error saving. Please try again.</div>';
    return false;
  }
}

function attachLiveVar(tp,ap){
  PROGRAMS.forEach(p=>p.ind.forEach(i=>{

    if(te&&ae){

        const t=parseFloat(te.value),a=parseFloat(ae.value);
        if(!isNaN(t)&&!isNaN(a)){const d=a-t;vEl.textContent=(d>=0?'+':'')+d.toFixed(2)+(i.u||'');vEl.className=d>=0?'vm':'vx'}
        else{vEl.textContent='—';vEl.className='vn'}

      te.addEventListener('input',upd);ae.addEventListener('input',upd);
    }
  }));
}

async function doUpload(inp){
  const msg=document.getElementById('upMsg');
  const files=Array.from(inp.files).filter(f=>f.type==='application/pdf');
  if(!files.length){msg.innerHTML='<div class="alert al-d">PDF files only.</div>';return}
  msg.innerHTML='<div class="alert al-i">Uploading...</div>';
  let ok=0;
  for(const f of files){
    const fp=`${CS}/${encQ}/${Date.now()}_${f.name}`;
    const r=await fetch(`${SB}/storage/v1/object/bar1-uploads/${fp}`,{method:'POST',headers:{apikey:SK,Authorization:`Bearer ${SK}`,'Content-Type':'application/pdf'},body:f});
    if(r.ok){await dbUpsert('bar1_uploads',[{sdo_code:CS,quarter:encQ,file_name:f.name,file_path:fp}]);ok++}
  }
  msg.innerHTML=`<div class="alert al-s">✅ ${ok} file(s) uploaded!</div>`;
  await loadAll();rSDOEnc();
}

  try{
    if(rows.length)await dbUpsert('bar1_targets',rows);
    msg.innerHTML='<div class="alert al-s">✅ RO Targets saved!</div>';
    await loadAll();setTimeout(()=>msg.innerHTML='',3000);
  }catch{msg.innerHTML='<div class="alert al-d">❌ Error saving.</div>'}
}

// ===== ADMIN: PDFs =====
function rAdmPDFs(){
  const el=document.getElementById('tab-admin-pdfs');
  if(!uploads.length){el.innerHTML='<div class="section-card"><div class="alert al-i">No PDF files have been uploaded yet.</div></div>';return}
  let h='<div class="section-card"><div class="section-title">📎 All Uploaded BAR 1 PDFs</div>';
  QS.forEach(q=>{
    const qu=uploads.filter(u=>u.quarter===q);
    if(!qu.length)return;
    h+=`<div style="margin-bottom:18px"><div style="font-weight:700;font-size:13px;margin-bottom:10px;padding:8px 12px;background:#ebf8ff;border-radius:8px;color:#2c5282">${q} 2026 — ${qu.length} file(s)</div>`;
    qu.forEach(u=>{
      h+=`<div class="upload-item"><span><strong>${SDONAMES[u.sdo_code]||u.sdo_code}</strong> — 📄 ${u.file_name}</span>
        <a href="${SB}/storage/v1/object/public/bar1-uploads/${u.file_path}" target="_blank" class="btn btn-p" style="padding:4px 10px;font-size:12px">View PDF</a></div>`;
    });
    h+='</div>';
  });
  h+='</div>';el.innerHTML=h;
}

// ===== ADMIN: PDF CONTROL =====
function rAdmPDFCtrl(){
  const el=document.getElementById('tab-admin-pdfctrl');
  let h=`<div class="section-card">
    <div class="section-title">⚙️ PDF Upload Control</div>
    <div class="alert al-i" style="font-size:13px;margin-bottom:14px">
      Enable or disable PDF uploads per quarter. When a quarter is <strong>disabled</strong>, SDOs see a message that the window is closed. When <strong>enabled</strong>, SDOs can upload their approved BAR 1 PDF.
    </div>
    <div id="pdfCtrlMsg"></div>`;
  QS.forEach(q=>{
    const en=pdfCtrl[q];
    h+=`<div class="toggle-wrap">
      <label class="toggle"><input type="checkbox" id="tgl_${q}" ${en?'checked':''} onchange="setPDFCtrl('${q}',this.checked)"><span class="slider"></span></label>
      <span style="font-size:14px;font-weight:600;flex:1">${q} 2026 — PDF Upload Window</span>
      <span class="badge ${en?'bg':'br'}" id="tglBadge_${q}">${en?'ENABLED':'DISABLED'}</span>
    </div>`;
  });
  h+='</div>';el.innerHTML=h;
}
async function setPDFCtrl(q,en){
  const badge=document.getElementById(`tglBadge_${q}`);
  badge.textContent=en?'ENABLED':'DISABLED';
  badge.className=`badge ${en?'bg':'br'}`;
  try{
    await dbUpsert('bar1_data',[{sdo_code:'SETTINGS',quarter:'global',field_key:`pdf_upload_${q}`,field_value:en?1:0}]);
    pdfCtrl[q]=en;
    const msg=document.getElementById('pdfCtrlMsg');
    msg.innerHTML=`<div class="alert al-s">✅ ${q} PDF upload ${en?'enabled':'disabled'}.</div>`;
    setTimeout(()=>msg.innerHTML='',3000);
  }catch{
    const msg=document.getElementById('pdfCtrlMsg');
    msg.innerHTML='<div class="alert al-d">❌ Error saving setting.</div>';
  }
}
</script>
