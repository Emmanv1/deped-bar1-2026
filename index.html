async function sb(table, method='GET', body=null, params=''){
  const url = `${SUPABASE_URL}/rest/v1/${table}${params}`;
  const opts = {
    method,
    headers:{
      'apikey':SUPABASE_KEY,
      'Authorization':'Bearer '+SUPABASE_KEY,
      'Content-Type':'application/json',
      'Prefer': method==='POST'?'return=representation,resolution=merge-duplicates':'return=representation'
    }
  };
  if(body) opts.body=JSON.stringify(body);
  const r = await fetch(url, opts);
  if(method==='DELETE'||r.status===204) return [];
  return r.json();
}

async function sbUpsert(table, data){
  return sb(table,'POST',data,'');

async function sbGet(table, params=''){
  return sb(table,'GET',null,params);

async function sbDelete(table, params){

async function loadQuarterAssignments(){
  try{
    const r=await sbGet('bar1_quarter_assignments');
    quarterAssignments={};
    (r||[]).forEach(x=>{
      if(!quarterAssignments[x.indicator_key]) quarterAssignments[x.indicator_key]=[];
      if(!quarterAssignments[x.indicator_key].includes(x.quarter)) quarterAssignments[x.indicator_key].push(x.quarter);
    });
  }catch(e){quarterAssignments={};}
}

async function loadEncodingControl(){
  try{
    const r=await sbGet('bar1_settings','?setting_key=like.encoding_*');
    encodingControl={};
    (r||[]).forEach(x=>{const q=x.setting_key.replace('encoding_','');encodingControl[q]=x.setting_value==='true';});
  }catch(e){encodingControl={};}
}

async function loadPDFControl(){
  try{
    const r=await sbGet('bar1_settings','?setting_key=like.pdf_*');
    pdfControl={};
    (r||[]).forEach(x=>{const q=x.setting_key.replace('pdf_','');pdfControl[q]=x.setting_value==='true';});
  }catch(e){pdfControl={};}
}

async function loadCorrectionRequests(sdoCode=null, quarter=null){
  let params='?status=neq.resolved&';
  if(sdoCode) params+=`sdo_code=eq.${sdoCode}&`;
  if(quarter) params+=`quarter=eq.${quarter}&`;
  try{
    const r=await sbGet('bar1_correction_requests',params);
    correctionRequests={};
    (r||[]).forEach(x=>{correctionRequests[`${x.sdo_code}_${x.quarter}_${x.field_key}`]={status:x.status,id:x.id};});
  }catch(e){correctionRequests={};}
}

function getIndicatorsForQuarter(q){
  return ALL_INDICATORS.filter(i=>{
    const qs=quarterAssignments[i.key];
    return qs&&qs.includes(q);
  });
}

function renderDashPrograms(selectedQ, dataMap, roMap){
  const container=document.getElementById('dashPrograms');
  if(!container) return;

  // Chart.js v4 compatible destroy
  Object.values(Chart.instances||{}).forEach(c=>{try{c.destroy()}catch(e){}});

  const quarters=selectedQ==='ALL'?['Q1','Q2','Q3','Q4']:[selectedQ];
  let html='';

  PROGRAMS.forEach(prog=>{
    html+=`<div style="margin-bottom:28px">
      <div class="prog-header">${prog.name}</div>
      <div style="border:2px solid var(--primary);border-top:none;border-radius:0 0 10px 10px;padding:16px">`;

    prog.sections.forEach(sec=>{
      html+=`<div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;padding:6px 10px;background:#e8f0fb;border-radius:6px;margin-bottom:12px">
          ${sec.title}
        </div>`;

      sec.indicators.forEach(ind=>{
        const assignedQs=quarterAssignments[ind.key]||[];
        if(!assignedQs.length) return; // skip unassigned in dashboard

        // In "All Quarters" view: show one card per indicator with total/aggregate
        // In filtered quarter view: only show if that quarter is assigned
        if(selectedQ!=='ALL' && !assignedQs.includes(selectedQ)) return;

        // Which quarters to aggregate for accomplishment
        const aggQs=selectedQ==='ALL'?assignedQs:[selectedQ];
        const accomplishment=getConsolidatedAccomplishmentForQs(ind, dataMap, aggQs);

        // RO target: for multi-quarter, show the target for the selected quarter, or total
        let roTarget=0;
        if(selectedQ==='ALL'){
          roTarget=getTotalROTarget(ind, roMap);
        } else {
          roTarget=Number(roMap[`${selectedQ}_${ind.key}`])||0;
        }

        const pct=roTarget>0?Math.min(100,Math.round(accomplishment/roTarget*100)):0;
        const met=accomplishment>=roTarget&&roTarget>0;
        const barId='bar_'+Math.random().toString(36).slice(2,8);
        const pieId='pie_'+Math.random().toString(36).slice(2,8);
        const qBadges=assignedQs.map(q=>`<span style="background:var(--accent);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700;margin-right:2px">${q}</span>`).join('');

        html+=`<div style="background:#fafbfc;border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px">
          <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.4">
            ${ind.label} ${qBadges}
            <span class="badge ${met?'badge-met':'badge-below'}" style="float:right;margin-top:2px">${roTarget>0?(met?'MET':'BELOW'):'NO TARGET'}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 220px;gap:16px;align-items:center">
            <div>
              <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px">
                <span style="color:#c62828">RO Target: <strong>${roTarget.toLocaleString()}</strong></span>
                <span style="color:var(--primary)">Accomplishment: <strong>${accomplishment.toLocaleString()}</strong></span>
                <span style="color:var(--muted)">${pct}%</span>
              </div>
              <canvas id="${barId}" height="100"></canvas>
            </div>
            <div style="text-align:center">
              <canvas id="${pieId}" height="130" width="200"></canvas>
              <div style="font-size:11px;color:var(--muted);margin-top:4px">${pct}% of Target</div>
            </div>
          </div>
        </div>`;

        // Render charts after DOM insertion
        setTimeout(()=>{
          const barCtx=document.getElementById(barId);
          const pieCtx=document.getElementById(pieId);
          if(barCtx){
            new Chart(barCtx,{
              type:'bar',
              data:{
                labels:['RO Target','Accomplishment'],
                datasets:[{
                  data:[roTarget, accomplishment],
                  backgroundColor:['rgba(198,40,40,0.7)','rgba(26,58,92,0.8)'],
                  borderColor:['#c62828','#1a3a5c'],
                  borderWidth:2,
                  borderRadius:8
                }]
              },
              options:{
                responsive:true,
                indexAxis:'y',
                plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed.x.toLocaleString()}`}}},
                scales:{x:{beginAtZero:true,ticks:{font:{size:10},callback:v=>v.toLocaleString()}},y:{ticks:{font:{size:11}}}}
              }
            });
          }
          if(pieCtx){
            const remaining=Math.max(0,roTarget-accomplishment);
            new Chart(pieCtx,{
              type:'doughnut',
              data:{
                labels:['Accomplishment','Remaining'],
                datasets:[{
                  data:[accomplishment, remaining||1],
                  backgroundColor:[met?'rgba(46,125,50,0.8)':'rgba(26,58,92,0.8)','rgba(220,220,220,0.4)'],
                  borderColor:[met?'#2e7d32':'#1a3a5c','#ddd'],
                  borderWidth:2
                }]
              },
              options:{
                responsive:false,
                cutout:'60%',
                plugins:{
                  legend:{display:true,position:'bottom',labels:{font:{size:10},boxWidth:12}},
                  tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed.toLocaleString()}`}}
                }
              }
            });
          }
        },80);
      });
      html+=`</div>`;
    });
    html+=`</div></div>`;
  });

  container.innerHTML=html;
}

    .ro-q-cell label{font-size:12px;font-weight:700;color:var(--primary);min-width:20px;cursor:pointer}
    .ro-q-cell input[type=number]{width:90px;padding:4px 8px;border:1.5px solid var(--border);border-radius:5px;font-size:13px;font-weight:600}

  </style>`;

      html+=`<div class="ind-sub" style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:8px">${sec.title}</div>`;
      sec.indicators.forEach(ind=>{
        const assignedQs=quarterAssignments[ind.key]||[];
        // Get target for each quarter
        const qVals={};
        ['Q1','Q2','Q3','Q4'].forEach(q=>{qVals[q]=roMap[`${q}_${ind.key}`]??'';});
        
        html+=`<div class="ro-ind-group" id="roig_${ind.key}">
          <div class="ind-label">${ind.label} <span style="font-size:11px;color:var(--muted);font-weight:500">(${ind.type==='pct'?'%':'count'})</span>
            <span class="ro-total-tag" id="rototal_${ind.key}">Total Target: ${calcROTotal(ind, assignedQs, qVals)}</span>
          </div>
          <div class="ro-q-row">`;
        
        ['Q1','Q2','Q3','Q4'].forEach(q=>{
          const isChecked=assignedQs.includes(q);
          const tVal=qVals[q];
          html+=`<div class="ro-q-cell ${isChecked?'active-q':''}" id="roqcell_${ind.key}_${q}">
            <input type="checkbox" id="qchk_${ind.key}_${q}" ${isChecked?'checked':''}
              onchange="roQToggle('${ind.key}','${q}',this.checked,'${ind.type}')">

            <input type="number" id="rot_${q}_${ind.key}" value="${tVal}" placeholder="0" min="0"
              style="width:90px" ${isChecked?'':'disabled'}
              oninput="updateROTotal('${ind.key}','${ind.type}')">
          </div>`;
        });
        
        html+=`</div></div>`;
      });
    });
    html+=`</div>`;
  });

  mc.innerHTML=html;

  // Define helpers in window scope
  window.roQToggle=function(indKey, q, checked, indType){
    const cell=document.getElementById(`roqcell_${indKey}_${q}`);
    const numInput=document.getElementById(`rot_${q}_${indKey}`);
    if(cell) cell.classList.toggle('active-q', checked);
    if(numInput) numInput.disabled=!checked;
    updateROTotal(indKey, indType);
  };

  window.updateROTotal=function(indKey, indType){
    const tag=document.getElementById(`rototal_${indKey}`);
    if(!tag) return;
    const checkedQs=['Q1','Q2','Q3','Q4'].filter(q=>document.getElementById(`qchk_${indKey}_${q}`)?.checked);
    const vals={};
    ['Q1','Q2','Q3','Q4'].forEach(q=>{vals[q]=document.getElementById(`rot_${q}_${indKey}`)?.value??'';});
    tag.textContent='Total Target: '+calcROTotal({type:indType}, checkedQs, vals);
  };
}

function calcROTotal(ind, assignedQs, qVals){
  if(!assignedQs||!assignedQs.length) return '—';
  const nums=assignedQs.map(q=>Number(qVals[q])||0);
  if(ind.type==='pct'){
    const avg=nums.reduce((a,b)=>a+b,0)/nums.length;
    return Math.round(avg*100)/100;
  }
  return nums.reduce((a,b)=>a+b,0);
}

async function saveROTargets(){
  const msg=document.getElementById('roMsg');
  msg.style.display='none';
  
  const upsertData=[];
  const assignData=[];
  
  ALL_INDICATORS.forEach(ind=>{
    ['Q1','Q2','Q3','Q4'].forEach(q=>{
      const chkEl=document.getElementById(`qchk_${ind.key}_${q}`);
      const valEl=document.getElementById(`rot_${q}_${ind.key}`);
      if(!chkEl||!valEl) return;
      if(chkEl.checked){
        assignData.push({indicator_key:ind.key, quarter:q});
        // Always save even if 0 — admin has full control
        const val=valEl.value===''?0:parseFloat(valEl.value)||0;
        upsertData.push({sdo_code:'RO', quarter:q, field_key:ind.key, field_value:val});
      }
    });
  });

  try{
    const hdr={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'};

    // DELETE all existing RO targets first
    await fetch(`${SUPABASE_URL}/rest/v1/bar1_targets?sdo_code=eq.RO`,{
      method:'DELETE',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });

    // Delete all existing quarter assignments
    await sbDelete('bar1_quarter_assignments','?indicator_key=not.eq.__none__');
    
    // Insert new assignments (multi-quarter per indicator)
    if(assignData.length>0){
      await fetch(`${SUPABASE_URL}/rest/v1/bar1_quarter_assignments`,{method:'POST',headers:hdr,body:JSON.stringify(assignData)});
    }
    
    // Insert fresh targets
    if(upsertData.length>0){
      await fetch(`${SUPABASE_URL}/rest/v1/bar1_targets?on_conflict=sdo_code,quarter,field_key`,{method:'POST',headers:hdr,body:JSON.stringify(upsertData)});
    }
    
    await loadQuarterAssignments();
    msg.textContent='✓ Targets and quarter assignments saved successfully!';
    msg.className='msg msg-success';
    msg.style.display='block';
    setTimeout(()=>msg.style.display='none',4000);
  }catch(e){
    msg.textContent='❌ Error saving: '+e.message;
    msg.className='msg msg-error';
    msg.style.display='block';
  }
}

async function saveEncodingCtrl(q, val){
  const badge=document.getElementById(`ec_badge_${q}`);
  const desc=document.querySelector(`#ec_${q}`)?.closest('.toggle-wrap')?.querySelector('div div:last-child');
  const msg=document.getElementById('ecMsg');
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/bar1_settings?on_conflict=setting_key`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=representation'},
      body:JSON.stringify({setting_key:`encoding_${q}`,setting_value:String(val)})

// ============================================================
// PAGE: ENCODE DATA (SDO) — multi-quarter assignment logic
// ============================================================
// Rules:
//   Admin assigns each indicator to one or more quarters (e.g. Q1 only, Q1+Q3, all four)
//   SDOs can encode in exactly the quarters admin assigned for each indicator
//   Each assigned quarter has its own independent target and accomplishment
//   Aggregation: all assigned-quarter accomplishments are summed (counts) or averaged (%s)
// ============================================================
const Q_ORDER=['Q1','Q2','Q3','Q4'];
function qIndex(q){return Q_ORDER.indexOf(q);}
function sdoAllowedQuarters(ind){
  // Returns which quarters SDO is allowed to encode for this indicator
  // With multi-quarter support: returns all quarters assigned by admin
  const roQs=quarterAssignments[ind.key];
  if(!roQs||!roQs.length) return [];
  return Q_ORDER.filter(q=>roQs.includes(q));
}
// Helper: get the "display" quarter label for an indicator (sorted list)
function getAssignedQLabel(ind){
  const qs=quarterAssignments[ind.key];
  if(!qs||!qs.length) return '—';
  return Q_ORDER.filter(q=>qs.includes(q)).join(', ');
}
// Helper: get RO target for an indicator in a specific quarter
function getROTarget(ind, q, roMap){
  return roMap[`${q}_${ind.key}`]??0;
}
// Helper: get total RO target across all assigned quarters
function getTotalROTarget(ind, roMap){
  const qs=quarterAssignments[ind.key];
  if(!qs||!qs.length) return 0;
  if(ind.type==='pct'){
    const vals=qs.map(q=>roMap[`${q}_${ind.key}`]).filter(v=>v!==undefined&&v!==null&&v!=='');
    return vals.length?Math.round(vals.reduce((a,b)=>a+Number(b),0)/vals.length*100)/100:0;
  }
  return qs.reduce((s,q)=>s+(Number(roMap[`${q}_${ind.key}`])||0),0);
}

async function saveEncodeData(q){
  const msg=document.getElementById('encMsg');
  msg.style.display='none';
  
  const dataRows=[], targetRows=[], remarkRows=[];
  
  ALL_INDICATORS.forEach(ind=>{
    const allowedQs=sdoAllowedQuarters(ind);
    const corrKey=`${currentUser.username}_${q}_${ind.key}`;
    const corrApproved=correctionRequests[corrKey]?.status==='approved';
    const isOpen=encodingControl[q]||false;
    const isAllowed=allowedQs.includes(q);
    // Allow saving if: encoding is open (regardless of assignment) OR correction is approved
    if(!isOpen && !corrApproved) return;
    
    const tEl=document.getElementById(`tgt_${q}_${ind.key}`);
    const aEl=document.getElementById(`acc_${q}_${ind.key}`);
    const rEl=document.getElementById(`rmk_${q}_${ind.key}`);
    
    if(tEl&&tEl.value!==''){
      targetRows.push({sdo_code:currentUser.username,quarter:q,field_key:ind.key,field_value:parseFloat(tEl.value)||0});
    }
    if(aEl&&aEl.value!==''){
      dataRows.push({sdo_code:currentUser.username,quarter:q,field_key:ind.key,field_value:parseFloat(aEl.value)||0});
    }
    if(rEl&&rEl.value.trim()){
      remarkRows.push({sdo_code:currentUser.username,quarter:q,field_key:ind.key,remark_text:rEl.value.trim()});
    }
  });
  
  try{
    const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'};
    if(dataRows.length) await fetch(`${SUPABASE_URL}/rest/v1/bar1_data`,{method:'POST',headers,body:JSON.stringify(dataRows)});
    if(targetRows.length) await fetch(`${SUPABASE_URL}/rest/v1/bar1_targets`,{method:'POST',headers,body:JSON.stringify(targetRows)});
    if(remarkRows.length) await fetch(`${SUPABASE_URL}/rest/v1/bar1_remarks`,{method:'POST',headers,body:JSON.stringify(remarkRows)});

    // Mark any approved correction requests as resolved so SDO returns to read-only
    const approvedIds=ALL_INDICATORS.map(ind=>{
      const ck=`${currentUser.username}_${q}_${ind.key}`;
      return correctionRequests[ck]?.status==='approved'?correctionRequests[ck].id:null;
    }).filter(Boolean);
    for(const id of approvedIds){
      await fetch(`${SUPABASE_URL}/rest/v1/bar1_correction_requests?id=eq.${id}`,{
        method:'PATCH',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({status:'resolved'})
      });
    }

    msg.textContent='✅ Data submitted to Regional Office successfully!';
    msg.className='msg msg-success';
    msg.style.display='block';
    // Reload fresh data from server so UI reflects saved values
    const [freshData, freshTargets, freshRemarks]=await Promise.all([
      sbGet('bar1_data',`?sdo_code=eq.${currentUser.username}`),
      sbGet('bar1_targets',`?sdo_code=eq.${currentUser.username}`),
      sbGet('bar1_remarks',`?sdo_code=eq.${currentUser.username}`)
    ]);
    window._encDataMap={};(freshData||[]).forEach(r=>{window._encDataMap[`${r.quarter}_${r.field_key}`]=r.field_value;});
    window._encTargetMap={};(freshTargets||[]).forEach(r=>{window._encTargetMap[`${r.quarter}_${r.field_key}`]=r.field_value;});
    window._encRemarkMap={};(freshRemarks||[]).forEach(r=>{window._encRemarkMap[`${r.quarter}_${r.field_key}`]=r.remark_text;});
    // Reload to reflect the new locked state
    await loadCorrectionRequests(currentUser.username);
    const activeTab=document.querySelector('.q-tab.active');
    if(activeTab) await window.switchEncodeQ(activeTab.textContent.trim());
    setTimeout(()=>{const m2=document.getElementById('encMsg');if(m2)m2.style.display='none';},5000);
  }catch(e){
    msg.textContent='❌ Error saving: '+e.message;
    msg.className='msg msg-error';
    msg.style.display='block';
  }
}

async function requestQuarterCorrection(q){
  const allowed=ALL_INDICATORS.filter(ind=>sdoAllowedQuarters(ind).includes(q));
  if(!allowed.length){alert('No indicators are assigned to this quarter yet.');return;}
  let submitted=0;
  for(const ind of allowed){
    const corrKey=`${currentUser.username}_${q}_${ind.key}`;
    if(!correctionRequests[corrKey]){
      await fetch(`${SUPABASE_URL}/rest/v1/bar1_correction_requests`,{
        method:'POST',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
        body:JSON.stringify({sdo_code:currentUser.username,quarter:q,field_key:ind.key,status:'pending'})
      });
      submitted++;
    }
  }
  await loadCorrectionRequests(currentUser.username);
  const activeTab=document.querySelector('.q-tab.active');
  if(activeTab) await window.switchEncodeQ(activeTab.textContent.trim());
  const msg=document.getElementById('encMsg');
  if(msg){
    msg.textContent=submitted>0?`✓ Correction request submitted for ${submitted} indicator(s) in ${q}. Awaiting admin approval.`:`All indicators in ${q} already have pending or approved requests.`;
    msg.className='msg msg-'+(submitted>0?'success':'info');
    msg.style.display='block';
    setTimeout(()=>msg.style.display='none',5000);
  }
}

// ============================================================
// CUMULATIVE AGGREGATION HELPER
// ============================================================
// For a given indicator and all RO-assigned reporting quarters,
// aggregate all SDO accomplishments across those quarters.
// - Percentage indicators (type='pct'): AVERAGE across all assigned quarters with data
// - Count indicators (type='num'): SUM across all assigned quarters with data
function getConsolidatedAccomplishment(ind, allDataMap){
  const roQs=quarterAssignments[ind.key];
  if(!roQs||!roQs.length) return 0;
  const relevantQs=Q_ORDER.filter(q=>roQs.includes(q));
  
  if(ind.type==='pct'){
    // For percentage indicators: average across SDOs (per-SDO average across their assigned quarters, then average across SDOs)
    let sdoAvgs=[];
    SDO_LIST.forEach(sdo=>{
      let sdoVals=relevantQs.map(q=>allDataMap[`${sdo}_${q}_${ind.key}`]).filter(v=>v!==undefined&&v!==null&&v!=='');
      if(sdoVals.length>0){
        sdoAvgs.push(sdoVals.reduce((a,b)=>a+Number(b),0)/sdoVals.length);
      }
    });
    if(!sdoAvgs.length) return 0;
    return Math.round(sdoAvgs.reduce((a,b)=>a+b,0)/sdoAvgs.length*100)/100;
  } else {
    // For count indicators: SUM across all SDOs and all assigned quarters
    let total=0;
    SDO_LIST.forEach(sdo=>{
      relevantQs.forEach(q=>{
        const v=allDataMap[`${sdo}_${q}_${ind.key}`];
        if(v!==undefined&&v!==null&&v!=='') total+=Number(v);
      });
    });
    return Math.round(total*100)/100;
  }
}

// Same as above but for a specific set of quarters (used by dashboard quarter filter)
function getConsolidatedAccomplishmentForQs(ind, allDataMap, relevantQs){
  if(!relevantQs||!relevantQs.length) return 0;
  if(ind.type==='pct'){
    let sdoAvgs=[];
    SDO_LIST.forEach(sdo=>{
      let sdoVals=relevantQs.map(q=>allDataMap[`${sdo}_${q}_${ind.key}`]).filter(v=>v!==undefined&&v!==null&&v!=='');
      if(sdoVals.length>0){
        sdoAvgs.push(sdoVals.reduce((a,b)=>a+Number(b),0)/sdoVals.length);
      }
    });
    if(!sdoAvgs.length) return 0;
    return Math.round(sdoAvgs.reduce((a,b)=>a+b,0)/sdoAvgs.length*100)/100;
  } else {
    let total=0;
    SDO_LIST.forEach(sdo=>{
      relevantQs.forEach(q=>{
        const v=allDataMap[`${sdo}_${q}_${ind.key}`];
        if(v!==undefined&&v!==null&&v!=='') total+=Number(v);
      });
    });
    return Math.round(total*100)/100;
  }
}

function renderSummaryBody(selectedQ){
  const container=document.getElementById('summaryBody');
  if(!container) return;
  const dataMap=window._summaryDataMap||{};
  const targetMap=window._summaryTargetMap||{};
  const roMap=window._summaryRoMap||{};
  const quarters=selectedQ==='ALL'?['Q1','Q2','Q3','Q4']:[selectedQ];

  let html='';
  PROGRAMS.forEach(prog=>{
    let progHasAny=false;
    let progHtml=`<div class="prog-header">${prog.name}</div><div style="border:2px solid var(--primary);border-top:none;border-radius:0 0 10px 10px;padding:12px;margin-bottom:16px">`;

    prog.sections.forEach(sec=>{
      let secHtml=`<div style="font-size:13px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.4px;padding:5px 8px;background:#e8f0fb;border-radius:5px;margin-bottom:8px">${sec.title}</div>`;
      secHtml+=`<table style="margin-bottom:12px"><thead><tr><th style="min-width:240px">Indicator</th><th>Quarter</th><th>RO Target</th><th>My SDO Target</th><th>Accomplishment</th><th>vs SDO Target</th><th>vs RO Target</th></tr></thead><tbody>`;

      let secHasAny=false;
      sec.indicators.forEach(ind=>{
        const roAssignedQs=quarterAssignments[ind.key]||[];
        quarters.forEach(q=>{
          const roTarget=(roAssignedQs.includes(q))?(roMap[`${q}_${ind.key}`]||0):0;
          const sdoTarget=targetMap[`${q}_${ind.key}`];
          const accomplishment=dataMap[`${q}_${ind.key}`];
          // Show row if: there is any data, or it's an assigned quarter
          if(sdoTarget===undefined && accomplishment===undefined && !roAssignedQs.includes(q)) return;
          secHasAny=true; progHasAny=true;
          const sT=sdoTarget??0;
          const acc=accomplishment??0;
          const metSDO=sT>0&&acc>=sT;
          const metRO=roTarget>0&&acc>=roTarget;
          secHtml+=`<tr>
            <td style="font-size:12px">${ind.label}</td>
            <td><span style="font-weight:700;color:var(--primary)">${q}</span></td>
            <td>${roTarget||'—'}</td>
            <td>${sdoTarget!==undefined?sdoTarget:'—'}</td>
            <td style="font-weight:700">${accomplishment!==undefined?accomplishment:'—'}</td>
            <td>${sT>0?`<span class="badge ${metSDO?'badge-met':'badge-below'}">${metSDO?'MET':'BELOW'}</span>`:'—'}</td>
            <td>${roTarget>0?`<span class="badge ${metRO?'badge-met':'badge-below'}">${metRO?'MET':'BELOW'}</span>`:'—'}</td>
          </tr>`;
        });
      });
      secHtml+=`</tbody></table>`;
      if(secHasAny) progHtml+=secHtml;
    });

    progHtml+=`</div>`;
    if(progHasAny) html+=progHtml;
  });

  if(!html) html=`<div class="card"><div class="empty">No data encoded yet for the selected quarter(s).</div></div>`;
  container.innerHTML=html;
}

async function uploadPDF(q){
  const fileInput=document.getElementById(`pdfFile_${q}`);
  const msg=document.getElementById(`pdfMsg_${q}`);
  if(!fileInput.files.length){alert('Please select a PDF file.');return;}
  msg.textContent='Uploading…';msg.className='msg msg-info';msg.style.display='block';
  
  for(const file of fileInput.files){
    const path=`${currentUser.username}/${q}/${Date.now()}_${file.name}`;
    const r=await fetch(`${SUPABASE_URL}/storage/v1/object/bar1-uploads/${path}`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/pdf'},
      body:file
    });
    if(r.ok){
      await fetch(`${SUPABASE_URL}/rest/v1/bar1_uploads`,{
        method:'POST',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({sdo_code:currentUser.username,quarter:q,file_name:file.name,file_path:path})
      });
    }
  }
  msg.textContent='✓ PDF(s) uploaded successfully!';msg.className='msg msg-success';
}

async function renderConsolidated(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML=`<div class="page-title">📋 Consolidated Table</div><div class="loading">Loading…</div>`;
  await loadQuarterAssignments();
  
  const [allData, roData]=await Promise.all([
    sbGet('bar1_data'),
    sbGet('bar1_targets','?sdo_code=eq.RO')
  ]);
  
  const dataMap={};(allData||[]).forEach(r=>{dataMap[`${r.sdo_code}_${r.quarter}_${r.field_key}`]=r.field_value;});
  const roMap={};(roData||[]).forEach(r=>{roMap[`${r.quarter}_${r.field_key}`]=r.field_value;});
  
  let activeQ='Q1';
  
  function buildConsoTable(q){
    // Show indicators that have this quarter assigned
    const indsForQ=ALL_INDICATORS.filter(i=>{
      const qs=quarterAssignments[i.key];
      return qs&&qs.includes(q);
    });
    
    let h=`<div style="font-size:12px;color:var(--muted);margin-bottom:10px">

      SDO values shown are per-quarter accomplishments for ${q}. Consolidated total aggregates all assigned quarters.
    </div>
    <div style="overflow-x:auto"><table style="min-width:1000px"><thead><tr>
      <th style="min-width:240px">Indicator</th>
      <th>RO Target (${q})</th>
      ${SDO_LIST.map(s=>`<th style="font-size:11px">${ACCOUNTS[s]?.name||s}</th>`).join('')}
      <th>RO Consolidated</th>
      <th>Status</th>
    </tr></thead><tbody>`;
    
    PROGRAMS.forEach(prog=>{
      const progInds=indsForQ.filter(i=>i.prog===prog.key);
      if(!progInds.length) return;
      h+=`<tr><td colspan="${SDO_LIST.length+4}" style="background:#e3f2fd;font-weight:700;color:#1565c0;font-size:12px;padding:8px 10px">${prog.name}</td></tr>`;
      
      prog.sections.forEach(sec=>{
        const secInds=progInds.filter(i=>sec.indicators.some(si=>si.key===i.key));
        if(!secInds.length) return;
        h+=`<tr><td colspan="${SDO_LIST.length+4}" style="background:#f5f5f5;font-size:11px;font-weight:700;color:var(--primary);padding:5px 10px">${sec.title}</td></tr>`;
        secInds.forEach(ind=>{
          const roT=roMap[`${q}_${ind.key}`];
          // Per-SDO value for this specific quarter
          const sdoVals=SDO_LIST.map(sdo=>{
            const v=dataMap[`${sdo}_${q}_${ind.key}`];
            return (v!==undefined&&v!==null)?Number(v):null;
          });
          const consolidated=getConsolidatedAccomplishmentForQs(ind, dataMap, [q]);
          const met=consolidated>=(roT||0)&&(roT||0)>0;
          h+=`<tr>
            <td style="font-size:12px">${ind.label}</td>
            <td>${roT??'—'}</td>
            ${sdoVals.map(v=>`<td>${v!==null?v:'—'}</td>`).join('')}
            <td style="font-weight:700">${consolidated||'—'}</td>
            <td>${roT>0?`<span class="badge ${met?'badge-met':'badge-below'}">${met?'MET':'BELOW'}</span>`:'—'}</td>
          </tr>`;
        });
      });
    });

    if(!indsForQ.length){
      h+=`<tr><td colspan="${SDO_LIST.length+4}" style="text-align:center;padding:20px;color:var(--muted)">No indicators assigned to ${q} yet.</td></tr>`;
    }
    h+=`</tbody></table></div>`;
    return h;
  }
  
  let html=`<div class="page-title">📋 Consolidated Table</div>
  <div class="q-tabs">
    ${['Q1','Q2','Q3','Q4'].map(q=>`<button class="q-tab ${q===activeQ?'active':''}" onclick="switchConsoQ('${q}')">${q}</button>`).join('')}
  </div>
  <div id="consoBody">${buildConsoTable('Q1')}</div>`;
  
  mc.innerHTML=html;
  window.switchConsoQ=function(q){
    document.querySelectorAll('.q-tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('consoBody').innerHTML=buildConsoTable(q);
  };
}

  });
  
  let html=`<div class="page-title">📁 SDO Submissions</div><div class="page-sub">Overview of which SDOs have submitted data.</div><div class="sdo-grid">`;
  SDO_LIST.forEach(sdo=>{
    const qs=[...((submitted[sdo]||new Set()))].sort().join(', ');
    const hasData=submitted[sdo]&&submitted[sdo].size>0;

    </div>`;
  });
  html+=`</div><div id="sdoDetail"></div>`;
  mc.innerHTML=html;
  
  window.viewSDO=async function(sdo){
    const detail=document.getElementById('sdoDetail');
    detail.innerHTML=`<div class="loading">Loading ${ACCOUNTS[sdo]?.name||sdo} data…</div>`;
    detail.scrollIntoView({behavior:'smooth'});
    const [d, t]=await Promise.all([
      sbGet('bar1_data',`?sdo_code=eq.${sdo}`),
      sbGet('bar1_targets',`?sdo_code=eq.${sdo}`)
    ]);
    const dm={};(d||[]).forEach(r=>{dm[`${r.quarter}_${r.field_key}`]=r.field_value;});
    const tm={};(t||[]).forEach(r=>{tm[`${r.quarter}_${r.field_key}`]=r.field_value;});
    
    let h=`<div class="card">
      <h3 style="display:flex;align-items:center;justify-content:space-between">
        <span>✏️ ${ACCOUNTS[sdo]?.name||sdo} — Edit / Revise Data</span>
        <button class="btn btn-success" onclick="saveAdminEdit('${sdo}')">💾 Save Changes</button>
      </h3>
      <div class="msg" id="adminEditMsg"></div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:14px">Admin may revise or clean any value. Leave a field blank to skip updating it.</p>`;

    const quarters=['Q1','Q2','Q3','Q4'];
    quarters.forEach(q=>{
      const hasQ=ALL_INDICATORS.some(i=>dm[`${q}_${i.key}`]!==undefined||tm[`${q}_${i.key}`]!==undefined);
      if(!hasQ) return;
      h+=`<h4 style="margin:14px 0 8px;padding:8px 12px;background:#e8f0fb;border-radius:6px;color:var(--primary)">${q}</h4>
      <table><thead><tr><th style="min-width:260px">Indicator</th><th>SDO Target</th><th>Accomplishment</th></tr></thead><tbody>`;
      ALL_INDICATORS.forEach(ind=>{
        const tv=tm[`${q}_${ind.key}`]; const av=dm[`${q}_${ind.key}`];
        if(tv===undefined&&av===undefined) return;
        h+=`<tr>
          <td style="font-size:12px">${ind.label}</td>
          <td><input type="number" id="ae_t_${sdo}_${q}_${ind.key}" value="${tv??''}" min="0" placeholder="—" style="width:100px;padding:4px 8px;border:1.5px solid var(--border);border-radius:5px;font-size:12px"></td>
          <td><input type="number" id="ae_a_${sdo}_${q}_${ind.key}" value="${av??''}" min="0" placeholder="—" style="width:100px;padding:4px 8px;border:1.5px solid var(--border);border-radius:5px;font-size:12px"></td>
        </tr>`;
      });
      h+=`</tbody></table>`;
    });
    if(!quarters.some(q=>ALL_INDICATORS.some(i=>dm[`${q}_${i.key}`]!==undefined||tm[`${q}_${i.key}`]!==undefined))){
      h+=`<div class="empty">This SDO has not submitted any data yet.</div>`;
    }
    h+=`<div style="margin-top:16px"><button class="btn btn-success" onclick="saveAdminEdit('${sdo}')">💾 Save Changes</button></div></div>`;
    detail.innerHTML=h;
    detail.scrollIntoView({behavior:'smooth'});
  };

  window.saveAdminEdit=async function(sdo){
    const msg=document.getElementById('adminEditMsg');
    msg.textContent='Saving…'; msg.className='msg msg-info'; msg.style.display='block';
    const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'};
    const dRows=[],tRows=[];
    ['Q1','Q2','Q3','Q4'].forEach(q=>{
      ALL_INDICATORS.forEach(ind=>{
        const tEl=document.getElementById(`ae_t_${sdo}_${q}_${ind.key}`);
        const aEl=document.getElementById(`ae_a_${sdo}_${q}_${ind.key}`);
        if(tEl&&tEl.value!=='') tRows.push({sdo_code:sdo,quarter:q,field_key:ind.key,field_value:parseFloat(tEl.value)||0});
        if(aEl&&aEl.value!=='') dRows.push({sdo_code:sdo,quarter:q,field_key:ind.key,field_value:parseFloat(aEl.value)||0});
      });
    });
    try{
      if(tRows.length) await fetch(`${SUPABASE_URL}/rest/v1/bar1_targets?on_conflict=sdo_code,quarter,field_key`,{method:'POST',headers,body:JSON.stringify(tRows)});
      if(dRows.length) await fetch(`${SUPABASE_URL}/rest/v1/bar1_data?on_conflict=sdo_code,quarter,field_key`,{method:'POST',headers,body:JSON.stringify(dRows)});
      msg.textContent='✓ Changes saved successfully!'; msg.className='msg msg-success';
      // Refresh the SDO card list to reflect updated submission status
      const sdoGrid=document.querySelector('.sdo-grid');
      if(sdoGrid){
        const allDataRefresh=await sbGet('bar1_data');
        const submittedRefresh={};
        (allDataRefresh||[]).forEach(r=>{if(!submittedRefresh[r.sdo_code])submittedRefresh[r.sdo_code]=new Set();submittedRefresh[r.sdo_code].add(r.quarter);});
        SDO_LIST.forEach(s=>{
          const card=sdoGrid.querySelector(`[onclick="viewSDO('${s}')"]`);
          if(!card) return;
          const qs=[...((submittedRefresh[s]||new Set()))].sort().join(', ');
          const hasData=submittedRefresh[s]&&submittedRefresh[s].size>0;
          card.className=`sdo-card ${hasData?'has-data':''}`;
          card.querySelector('p').textContent=hasData?'Submitted: '+qs:'No data submitted yet';
        });
      }
      setTimeout(()=>msg.style.display='none',4000);
    }catch(e){
      msg.textContent='❌ Error: '+e.message; msg.className='msg msg-error';
    }
  };
}

  allRemarks.forEach(r=>{
    const k=`${r.quarter}_${r.field_key}`;
    if(!grouped[k]) grouped[k]={quarter:r.quarter,field_key:r.field_key,remarks:[]};
    grouped[k].remarks.push({sdo:r.sdo_code,text:r.remark_text});
  });
  
  let html=`<div class="page-title">💬 Consolidated Remarks</div><div class="page-sub">All SDO remarks per indicator per quarter.</div>`;
  
  Object.values(grouped).forEach(g=>{
    const ind=ALL_INDICATORS.find(i=>i.key===g.field_key);
    html+=`<div class="card"><h3>${g.quarter} — ${ind?ind.label:g.field_key}</h3><table><thead><tr><th>SDO</th><th>Remark</th></tr></thead><tbody>`;
    g.remarks.forEach(r=>{
      html+=`<tr><td style="font-weight:700;font-size:12px">${ACCOUNTS[r.sdo]?.name||r.sdo}</td><td style="font-size:13px">${r.text}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  mc.innerHTML=html;
}

async function renderSDOTargets(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML=`<div class="page-title">🎯 SDO Targets</div><div class="loading">Loading…</div>`;
  await Promise.all([loadQuarterAssignments(),loadEncodingControl()]);
  const [myT,roT]=await Promise.all([
    sbGet('bar1_targets',`?sdo_code=eq.${currentUser.username}`),
    sbGet('bar1_targets','?sdo_code=eq.RO')
  ]);
  const tm={};(myT||[]).forEach(r=>{tm[`${r.quarter}_${r.field_key}`]=r.field_value;});
  const roMap={};(roT||[]).forEach(r=>{roMap[`${r.quarter}_${r.field_key}`]=r.field_value;});
  window._sdoTgtTm=tm; window._sdoTgtRo=roMap;

  let html=`<div class="page-title">🎯 SDO Targets</div>
  <div class="page-sub">${currentUser.name} — Set your division-level targets per indicator. Follow the quarter assignments set by the Administrator.</div>
  <div class="msg msg-success" id="sdoTgtMsg"></div>
  <div class="q-tabs">
    ${['Q1','Q2','Q3','Q4'].map((q,i)=>`<button class="q-tab ${i===0?'active':''}" id="stt_${q}" onclick="switchSDOTgt('${q}')">${q}</button>`).join('')}
  </div>
  <div id="sdoTgtBody"></div>`;
  mc.innerHTML=html;
  renderSDOTgtBody('Q1');
  window.switchSDOTgt=function(q){
    document.querySelectorAll('.q-tab').forEach(t=>t.classList.remove('active'));
    const tab=document.getElementById(`stt_${q}`);
    if(tab) tab.classList.add('active');
    renderSDOTgtBody(q);
  };
}

function renderSDOTgtBody(q){
  const container=document.getElementById('sdoTgtBody');
  if(!container) return;
  const tm=window._sdoTgtTm||{};
  const roMap=window._sdoTgtRo||{};
  const isOpen=encodingControl[q]||false;
  let html=`<div class="msg ${isOpen?'msg-success':'msg-info'}" style="display:block;margin-bottom:14px">
    ${isOpen?`✅ Encoding is <strong>OPEN</strong> for ${q}. You may set your targets.`:`🔒 Encoding for <strong>${q}</strong> is CLOSED. Targets are read-only.`}
  </div>`;
  PROGRAMS.forEach(prog=>{
    html+=`<div class="prog-header">${prog.name}</div><div class="prog-body">`;
    prog.sections.forEach(sec=>{
      html+=`<div class="ind-sub" style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:6px">${sec.title}</div>`;
      sec.indicators.forEach(ind=>{
        const roAssignedQs=quarterAssignments[ind.key]||[];
        const allowed=sdoAllowedQuarters(ind);
        const isAllowed=allowed.includes(q);
        const roTarget=roAssignedQs.includes(q)?(roMap[`${q}_${ind.key}`]??'—'):'—';
        const tVal=tm[`${q}_${ind.key}`]??'';
        const canEdit=isOpen&&isAllowed;
        html+=`<div class="ind-group" style="${!isAllowed?'opacity:0.45':''}">
          <div class="ind-label">${ind.label}</div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px">
            RO Assigned Quarters: <strong>${roAssignedQs.length?Q_ORDER.filter(x=>roAssignedQs.includes(x)).join(', '):'—'}</strong>
            &nbsp;|&nbsp; RO Target for ${q}: <strong>${roTarget}</strong>
            ${!isAllowed?` <span style="color:#c62828">(Not assigned in ${q})</span>`:''}
          </div>
          <div class="form-group" style="max-width:200px">
            <label>SDO Target for ${q}</label>
            <input type="number" id="sdotgt_${q}_${ind.key}" value="${tVal}" min="0" placeholder="0" ${canEdit?'':'disabled'}>
          </div>
        </div>`;
      });
    });
    html+=`</div>`;
  });
  if(isOpen){
    html+=`<div style="margin-top:16px"><button class="btn btn-primary" onclick="saveSDOTargets('${q}')">💾 Save ${q} Targets</button></div>`;
  }
  container.innerHTML=html;
}

async function saveSDOTargets(q){
  const msg=document.getElementById('sdoTgtMsg');
  msg.style.display='none';
  const rows=[];
  ALL_INDICATORS.forEach(ind=>{
    const el=document.getElementById(`sdotgt_${q}_${ind.key}`);
    if(el&&el.value!=='') rows.push({sdo_code:currentUser.username,quarter:q,field_key:ind.key,field_value:parseFloat(el.value)||0});
  });
  try{
    if(rows.length){
      await fetch(`${SUPABASE_URL}/rest/v1/bar1_targets`,{
        method:'POST',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
        body:JSON.stringify(rows)
      });
    }
    rows.forEach(r=>{if(!window._sdoTgtTm) window._sdoTgtTm={};window._sdoTgtTm[`${r.quarter}_${r.field_key}`]=r.field_value;});
    msg.textContent=`✓ ${q} SDO targets saved!`;
    msg.className='msg msg-success';
    msg.style.display='block';
    setTimeout(()=>msg.style.display='none',4000);
  }catch(e){
    msg.textContent='❌ Error: '+e.message;
    msg.className='msg msg-error';
    msg.style.display='block';
  }
}
