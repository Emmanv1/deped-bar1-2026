<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BAR 1 CY 2026 — DepEd Region XIII</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#f2f1ed;--surface:#fff;--surface2:#eceae3;--border:#d4d1c8;
  --text:#1a1917;--text2:#6b6860;--text3:#9b9890;
  --accent:#1a4fa8;--accent2:#0e7a5c;--warn:#b85c00;
  --danger:#c0272d;--purple:#5b3fa8;
  --radius:6px;--radius-lg:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{width:54px;height:54px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;margin:0 auto 1.25rem}
.login-title{font-size:18px;font-weight:600;text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:1.75rem}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:1rem}
.fg label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.fg input{font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.fg input:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary:hover{opacity:.87}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:var(--danger);font-size:12px;text-align:center;margin-top:.75rem;display:none}
.login-spin{text-align:center;font-size:12px;color:var(--text3);margin-top:.75rem;display:none}

/* APP */
#appShell{display:none;flex-direction:column;min-height:100vh}
header{background:var(--accent);color:#fff;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;border-bottom:3px solid #0f3380;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{width:32px;height:32px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--accent);flex-shrink:0}
.hdr-title{font-size:14px;font-weight:600}
.hdr-sub{font-size:10px;opacity:.7;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-user{font-size:12px;opacity:.85;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-out{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 12px;border-radius:999px;font-size:12px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif}
.btn-out:hover{background:rgba(255,255,255,.25)}
.content{flex:1;padding:1.5rem;max-width:1280px;width:100%;margin:0 auto}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:4px;width:fit-content;flex-wrap:wrap;margin-bottom:1.25rem}
.tab-btn{padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--text2);white-space:nowrap}
.tab-btn.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* CARDS */
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-bottom:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;margin-bottom:12px}
.card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;display:inline-block}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:1.25rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.9rem 1rem;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kpi-c,var(--accent))}
.kpi-label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.kpi-value{font-size:24px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--text);line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* FORM */
.sec-hd{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;padding:.5rem 0;border-bottom:2px solid var(--accent);margin:1.25rem 0 .75rem}
.sub-hd{font-size:11px;font-weight:600;color:var(--text2);margin:.75rem 0 .4rem;padding-left:4px;border-left:2px solid var(--border)}

/* Target+Accomplishment grid */
.ta-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;align-items:center;margin-bottom:6px}
.ta-grid.header-row span{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;text-align:center}
.ta-grid.header-row span:first-child{text-align:left}
.ta-label{font-size:12px;color:var(--text);padding:2px 0}
.ta-input{padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--bg);color:var(--text);outline:none;width:100%;text-align:right}
.ta-input:focus{border-color:var(--accent)}
.ta-input.target{background:#fffbf0;border-color:#e8d5a0}
.ta-input.target:focus{border-color:var(--warn)}
.ta-input.accomplish{background:#f0f9f5;border-color:#a8d5c0}
.ta-input.accomplish:focus{border-color:var(--accent2)}

.quarter-tabs{display:flex;gap:6px;flex-wrap:wrap}
.qtab{padding:5px 16px;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;color:var(--text2)}
.qtab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
.btn-save{background:var(--accent2);color:#fff;border:none;padding:9px 24px;border-radius:var(--radius);font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:1rem}
.btn-save:hover{opacity:.88}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.save-msg{font-size:12px;margin-top:.5rem;display:none;font-weight:500}
.msg-ok{color:var(--accent2)}
.msg-err{color:var(--danger)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{text-align:left;padding:7px 10px;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border);background:var(--bg);white-space:nowrap}
tbody td{padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg)}
tfoot td{padding:7px 10px;font-weight:600;background:var(--surface2);border-top:2px solid var(--border)}
.num{font-family:'IBM Plex Mono',monospace;text-align:right}
.th-target{background:#fffbf0 !important;color:var(--warn) !important}
.th-accomplish{background:#f0f9f5 !important;color:var(--accent2) !important}
.th-variance{background:#f0f0ff !important;color:var(--purple) !important}
td.target-cell{background:#fffbf0;font-family:'IBM Plex Mono',monospace;text-align:right}
td.accomplish-cell{background:#f0f9f5;font-family:'IBM Plex Mono',monospace;text-align:right}
td.variance-cell{font-family:'IBM Plex Mono',monospace;text-align:right}
td.var-neg{color:var(--danger)}
td.var-pos{color:var(--accent2)}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600}
.b-ok{background:#d4edda;color:#155724}
.b-warn{background:#fff3cd;color:#856404}
.b-na{background:var(--surface2);color:var(--text3)}
.b-blue{background:#cfe2ff;color:#084298}

/* SDO CARDS */
.sdo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:1.25rem}
.sdo-card{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--border);border-radius:var(--radius-lg);padding:.85rem 1rem;cursor:pointer;transition:border-color .15s}
.sdo-card:hover{border-color:var(--accent)}
.sdo-card.has-data{border-left-color:var(--accent2)}
.sdo-name{font-weight:500;font-size:13px;margin-bottom:3px}
.sdo-status{font-size:11px;color:var(--text3)}

/* PDF UPLOAD */
.upload-area{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:1.5rem;text-align:center;margin-bottom:1rem;cursor:pointer;transition:border-color .15s}
.upload-area:hover{border-color:var(--accent)}
.upload-area input[type=file]{display:none}
.upload-label{font-size:13px;color:var(--text2);cursor:pointer}
.upload-label strong{color:var(--accent)}
.upload-list{display:flex;flex-direction:column;gap:6px;margin-top:.75rem}
.upload-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-size:12px}
.upload-item a{color:var(--accent);text-decoration:none;font-weight:500}
.upload-item a:hover{text-decoration:underline}
.upload-time{color:var(--text3);font-size:11px}
.btn-del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:11px;padding:2px 6px;border-radius:var(--radius)}
.btn-del:hover{background:#fff0f0}

/* ALERT */
.alert{padding:9px 14px;border-radius:var(--radius);font-size:12px;margin-bottom:1rem;border-left:3px solid}
.alert-info{background:#e8f0fe;border-color:var(--accent);color:#1a1e5a}
.alert-warn{background:#fff8e6;border-color:var(--warn);color:#5a3a00}

/* MISC */
.row-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1rem}
.isel{font-family:'IBM Plex Sans',sans-serif;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text)}
.chart-wrap{position:relative;width:100%}
.loading{text-align:center;padding:2rem;color:var(--text3);font-size:13px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.legend-row{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--text2);margin-bottom:.75rem}
.legend-row span{display:flex;align-items:center;gap:5px}
.ldot{width:10px;height:10px;border-radius:2px;display:inline-block}
footer{text-align:center;font-size:11px;color:var(--text3);padding:1.5rem;border-top:1px solid var(--border);font-family:'IBM Plex Mono',monospace;margin-top:auto}
</style>
</head>

let TARGET_CACHE={};  // {sdo:{q:{key:val}}} targets
let UPLOAD_CACHE={};  // {sdo:{q:[{id,file_name,file_path,uploaded_at}]}}

// ═══════════════════════════════════════════
// CACHE HELPERS
// ═══════════════════════════════════════════
function setCache(cache,sdo,q,key,val){
  if(!cache[sdo])cache[sdo]={};
  if(!cache[sdo][q])cache[sdo][q]={};
  cache[sdo][q][key]=val;
}
function getD(sdo,q){return(DATA_CACHE[sdo]&&DATA_CACHE[sdo][q])||{};}
function getT(sdo,q){return(TARGET_CACHE[sdo]&&TARGET_CACHE[sdo][q])||{};}
function getU(sdo,q){return(UPLOAD_CACHE[sdo]&&UPLOAD_CACHE[sdo][q])||[];}
function hasD(sdo,q){return Object.values(getD(sdo,q)).some(v=>v!==null&&v!==undefined);}

function rowsToCache(rows,cache){
  rows.forEach(r=>{
    if(!cache[r.sdo_code])cache[r.sdo_code]={};
    if(!cache[r.sdo_code][r.quarter])cache[r.sdo_code][r.quarter]={};
    cache[r.sdo_code][r.quarter][r.field_key]=r.field_value;
  });
}
function uploadsToCache(rows){
  rows.forEach(r=>{
    if(!UPLOAD_CACHE[r.sdo_code])UPLOAD_CACHE[r.sdo_code]={};
    if(!UPLOAD_CACHE[r.sdo_code][r.quarter])UPLOAD_CACHE[r.sdo_code][r.quarter]=[];
    if(!UPLOAD_CACHE[r.sdo_code][r.quarter].find(u=>u.id===r.id))
      UPLOAD_CACHE[r.sdo_code][r.quarter].push(r);
  });
}

async function loadAll(){
  const[data,targets,uploads]=await Promise.all([
    sbGet('bar1_data'),sbGet('bar1_targets'),sbGet('bar1_uploads')
  ]);
  DATA_CACHE={}; TARGET_CACHE={};
  rowsToCache(data,DATA_CACHE);
  rowsToCache(targets,TARGET_CACHE);
  UPLOAD_CACHE={};
  uploadsToCache(uploads);
}
async function loadSDO(sdo){
  const[data,targets,uploads]=await Promise.all([
    sbGet('bar1_data',`sdo_code=eq.${sdo}`),
    sbGet('bar1_targets',`sdo_code=eq.${sdo}`),
    sbGet('bar1_uploads',`sdo_code=eq.${sdo}`)
  ]);
  rowsToCache(data,DATA_CACHE);
  rowsToCache(targets,TARGET_CACHE);
  uploadsToCache(uploads);
}

async function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase();
  const p=document.getElementById('lp').value;
  const acc=ACCOUNTS[u];
  document.getElementById('loginErr').style.display='none';
  if(!acc||acc.pass!==p){document.getElementById('loginErr').style.display='block';return;}
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loginSpin').style.display='block';
  try{
    if(acc.role==='admin') await loadAll();
    else await loadSDO(acc.code);
    CU={...acc,username:u};
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appShell').style.display='flex';
    document.getElementById('hdrUser').textContent=CU.name;
    AT='encode'; AQ='Q1'; adminSDO=null;
    renderApp();
  }catch(e){
    document.getElementById('loginErr').textContent='Connection error. Please check internet and try again.';
    document.getElementById('loginErr').style.display='block';
  }
  document.getElementById('loginBtn').disabled=false;
  document.getElementById('loginSpin').style.display='none';
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none')doLogin();});

function doLogout(){
  CU=null; DATA_CACHE={}; TARGET_CACHE={}; UPLOAD_CACHE={};
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('lu').value=''; document.getElementById('lp').value='';
  document.getElementById('loginErr').style.display='none';
  Object.values(CH).forEach(c=>c&&c.destroy&&c.destroy()); CH={};
}

function buildFormHTML(sdo,q,prefix,readonlyTarget=false){
  const acc=getD(sdo,q);
  const tgt=getT(sdo,q);
  let html='';
  SECTIONS.forEach(sec=>{
    html+=`<div class="sec-hd">${sec.label}</div>`;
    sec.groups.forEach(grp=>{
      html+=`<div class="sub-hd">${grp.label}</div>`;
      // Header row
      html+=`<div class="ta-grid header-row">
        <span>Indicator</span>
        <span style="color:var(--warn)">Target</span>
        <span style="color:var(--accent2)">Accomplishment</span>
      </div>`;
      grp.fields.forEach(f=>{
        const tv=tgt[f.k]!==null&&tgt[f.k]!==undefined?tgt[f.k]:'';
        const av=acc[f.k]!==null&&acc[f.k]!==undefined?acc[f.k]:'';
        const tAttr=readonlyTarget?'readonly style="opacity:.6"':'';
        html+=`<div class="ta-grid">
          <span class="ta-label">${f.lab}${f.pct?' (%)':''}</span>
          <input class="ta-input target" type="number" min="0" step="${f.pct?'0.01':'1'}"
            id="${prefix}t_${f.k}" value="${tv}" placeholder="—" ${tAttr}/>
          <input class="ta-input accomplish" type="number" min="0" step="${f.pct?'0.01':'1'}"
            id="${prefix}a_${f.k}" value="${av}" placeholder="—"/>
        </div>`;
      });
    });
  });
  return html;
}

async function sdoSave(){
  const sdo=CU.code;
  const btn=document.getElementById('btnSave');
  const msg=document.getElementById('sMsg');
  btn.disabled=true; btn.textContent='Saving...'; msg.style.display='none';
  const accRows=[],tgtRows=[];
  const now=new Date().toISOString();
  ALL_FIELDS.forEach(f=>{
    const ta=document.getElementById('sdo_t_'+f.k);
    const aa=document.getElementById('sdo_a_'+f.k);
    if(ta&&ta.value!=='')tgtRows.push({sdo_code:sdo,quarter:AQ,field_key:f.k,field_value:parseFloat(ta.value),updated_at:now});
    if(aa&&aa.value!=='')accRows.push({sdo_code:sdo,quarter:AQ,field_key:f.k,field_value:parseFloat(aa.value),updated_at:now});
  });
  try{
    if(tgtRows.length)await sbUpsert('bar1_targets',tgtRows);
    if(accRows.length)await sbUpsert('bar1_data',accRows);
    tgtRows.forEach(r=>setCache(TARGET_CACHE,sdo,AQ,r.field_key,r.field_value));
    accRows.forEach(r=>setCache(DATA_CACHE,sdo,AQ,r.field_key,r.field_value));
    msg.className='save-msg msg-ok'; msg.textContent='✓ Data saved to cloud successfully!';
  }catch(e){
    msg.className='save-msg msg-err'; msg.textContent='✗ Save failed. Check your internet connection.';
  }
  msg.style.display='block';
  btn.disabled=false; btn.textContent=`☁️ Save ${AQ} Data to Cloud`;
  setTimeout(()=>msg.style.display='none',4000);
}

      ${QUARTERS.map(q=>`<th class="th-target num">${q} Target</th><th class="th-accomplish num">${q} Acc.</th><th class="th-variance num">${q} Var.</th>`).join('')}
      </tr></thead><tbody>`;
    sec.groups.forEach(grp=>{
      html+=`<tr><td colspan="${1+QUARTERS.length*3}" style="background:var(--surface2);font-size:11px;font-weight:600;color:var(--text2);padding:5px 10px">${grp.label}</td></tr>`;
      grp.fields.forEach(f=>{
        html+=`<tr><td>${f.lab}${f.pct?' (%)':''}</td>`;
        QUARTERS.forEach(q=>{
          const t=getT(sdo,q)[f.k];const a=getD(sdo,q)[f.k];
          const td=(t===null||t===undefined)?'—':(f.pct?Number(t).toFixed(1)+'%':Number(t).toLocaleString());
          const ad=(a===null||a===undefined)?'—':(f.pct?Number(a).toFixed(1)+'%':Number(a).toLocaleString());
          let vd='—',vcls='variance-cell';
          if(t!==null&&t!==undefined&&a!==null&&a!==undefined){
            const v=Number(a)-Number(t);
            vd=(f.pct?v.toFixed(1)+'%':v.toLocaleString());
            vcls='variance-cell '+(v>=0?'var-pos':'var-neg');
          }
          html+=`<td class="target-cell">${td}</td><td class="accomplish-cell">${ad}</td><td class="${vcls}">${vd}</td>`;
        });
        html+=`</tr>`;
      });
    });

  });
  el.innerHTML=html||'<div class="alert alert-warn">No data encoded yet.</div>';
}

async function uploadPDF(sdo,q,input){
  const file=input.files[0];
  if(!file)return;
  if(file.type!=='application/pdf'){alert('Please select a PDF file only.');input.value='';return;}
  const msg=document.getElementById('upMsg_'+q);
  msg.className='save-msg msg-ok'; msg.textContent='⏳ Uploading...'; msg.style.display='block';
  try{
    const path=`${sdo}/${q}/${Date.now()}_${file.name.replace(/\s+/g,'_')}`;
    const url=await sbUploadFile(path,file);
    const row={sdo_code:sdo,quarter:q,file_name:file.name,file_path:url};
    const inserted=await sbInsert('bar1_uploads',row);
    if(!UPLOAD_CACHE[sdo])UPLOAD_CACHE[sdo]={};
    if(!UPLOAD_CACHE[sdo][q])UPLOAD_CACHE[sdo][q]=[];
    UPLOAD_CACHE[sdo][q].push(inserted[0]||{...row,id:Date.now(),uploaded_at:new Date().toISOString()});
    msg.textContent='✓ File uploaded successfully!';
    renderSDOUploads(sdo);
  }catch(e){
    msg.className='save-msg msg-err'; msg.textContent='✗ Upload failed. Check internet connection.';
  }
  input.value='';
  setTimeout(()=>msg.style.display='none',4000);
}

async function deleteUpload(id,sdo,q){
  if(!confirm('Remove this file?'))return;
  try{
    await sbDelete('bar1_uploads',`id=eq.${id}`);
    if(UPLOAD_CACHE[sdo]&&UPLOAD_CACHE[sdo][q])
      UPLOAD_CACHE[sdo][q]=UPLOAD_CACHE[sdo][q].filter(u=>u.id!==id);
    renderSDOUploads(sdo);
  }catch(e){alert('Delete failed. Try again.');}
}

      <div class="card"><div class="card-title">Teachers trained per SDO — all quarters</div><div class="chart-wrap" style="height:180px"><canvas id="cSdo"></canvas></div></div>
    </div>

    <!-- RO TARGETS -->
    <div id="aRotargets" style="display:${AT==='rotargets'?'block':'none'}">
      <div class="alert alert-info"><strong>Regional Office Annual Targets.</strong> These targets apply to the whole region for CY 2026. Set them once — SDOs will see them as reference when encoding their own targets.</div>
      <div class="card">
        <div class="card-title">RO Annual Targets — CY 2026</div>
        ${buildROTargetsForm()}
        <button class="btn-save" id="btnROSave" onclick="saveROTargets()">☁️ Save RO Annual Targets</button>
        <div class="save-msg" id="roMsg"></div>
      </div>
    </div>

    <!-- SUBMISSIONS -->
    <div id="aSub" style="display:${AT==='submissions'?'block':'none'}">
      <div class="alert alert-info">Click any SDO card to view their full submitted data. <span style="color:var(--accent2);font-weight:600">Green border</span> = data submitted.</div>
      <div class="sdo-grid">${sdoCards}</div>
      <div id="sdoDetail"></div>
    </div>

    <!-- CONSOLIDATED -->
    <div id="aCon" style="display:${AT==='consolidated'?'block':'none'}">${buildConsolidated()}</div>

    <!-- PDFS -->
    <div id="aPdfs" style="display:${AT==='pdfs'?'block':'none'}">${buildAllPDFs()}</div>

    <!-- EDIT -->
    <div id="aEdit" style="display:${AT==='edit'?'block':'none'}">
      <div class="row-between">
        <span style="font-size:13px;color:var(--text2);font-weight:500">Select SDO and quarter:</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <select class="isel" id="eSdo" onchange="loadEdit()">
            ${SDO_LIST.map(s=>`<option value="${s.code}">${s.name}</option>`).join('')}
          </select>
          <select class="isel" id="eQ" onchange="loadEdit()">
            ${QUARTERS.map(q=>`<option>${q}</option>`).join('')}
          </select>
        </div>
      </div>
      <div id="editForm"></div>
    </div>
  `;

  setTimeout(()=>{
    buildAdminCharts();
    if(AT==='edit') loadEdit();
    if(adminSDO) showSDODetail(adminSDO);
  },50);
}

function aTab(t,btn){
  AT=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const map={dashboard:'aDash',rotargets:'aRotargets',submissions:'aSub',consolidated:'aCon',pdfs:'aPdfs',edit:'aEdit'};
  Object.entries(map).forEach(([k,id])=>{const el=document.getElementById(id);if(el)el.style.display=k===t?'block':'none';});
  if(t==='edit') loadEdit();
}

async function refreshAdmin(){
  document.getElementById('appContent').innerHTML=`<div class="loading"><span class="spinner"></span>Refreshing data from cloud...</div>`;
  await loadAll();
  renderAdmin();
}

function getKPIs(){
  let trained=0,constructed=0,ongoing=0,berf=0,sdoCount=0,pdfs=0;
  SDO_LIST.forEach(s=>{
    let any=false;
    QUARTERS.forEach(q=>{
      const d=getD(s.code,q);
      trained+=(Number(d.teachers_trained)||0)+(Number(d.trp_trained)||0)+(Number(d.ntp_trained)||0);
      constructed+=Number(d.classrooms_constructed)||0;
      ongoing+=Number(d.classrooms_ongoing)||0;
      berf+=Number(d.berf_approved)||0;
      pdfs+=getU(s.code,q).length;
      if(hasD(s.code,q))any=true;
    });
    if(any)sdoCount++;
  });
  return{trained,constructed,ongoing,berf,sdoCount,pdfs};
}

function buildAdminCharts(){
  Object.values(CH).forEach(c=>c&&c.destroy&&c.destroy()); CH={};
  const SHORT=SDO_LIST.map(s=>s.name.replace('Surigao del','Sur.').replace('Agusan del','Ag.').replace(' City','').replace(' Islands',''));
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},color:'#9b9890',maxRotation:45}},y:{ticks:{font:{size:10},color:'#9b9890'}}}};
  const subData=SDO_LIST.map(s=>QUARTERS.filter(q=>hasD(s.code,q)).length);
  CH.cSub=new Chart(document.getElementById('cSub'),{type:'bar',data:{labels:SHORT,datasets:[{data:subData,backgroundColor:subData.map(v=>v===4?'#0e7a5c':'#1a4fa8'),borderRadius:4}]},options:{...base,scales:{x:{ticks:{font:{size:10},color:'#9b9890',maxRotation:45}},y:{max:4,ticks:{stepSize:1,font:{size:10},color:'#9b9890'}}}}});
  const qT=QUARTERS.map(q=>SDO_LIST.reduce((s,sdo)=>{const d=getD(sdo.code,q);return s+(Number(d.teachers_trained)||0)+(Number(d.trp_trained)||0)+(Number(d.ntp_trained)||0);},0));
  CH.cQtr=new Chart(document.getElementById('cQtr'),{type:'bar',data:{labels:QUARTERS,datasets:[{data:qT,backgroundColor:['#1a4fa8','#0e7a5c','#b85c00','#5b3fa8'],borderRadius:4}]},options:{...base,scales:{x:{ticks:{font:{size:12},color:'#9b9890'}},y:{ticks:{font:{size:10},color:'#9b9890'}}}}});
  CH.cSdo=new Chart(document.getElementById('cSdo'),{type:'bar',data:{labels:SHORT,datasets:[{data:SDO_LIST.map(s=>QUARTERS.reduce((t,q)=>{const d=getD(s.code,q);return t+(Number(d.teachers_trained)||0);},0)),backgroundColor:'#1a4fa8',borderRadius:4}]},options:{...base}});
}

// ─── RO TARGETS ─────────────────────────────
function buildROTargetsForm(){
  let html='<div class="alert alert-warn">These are the <strong>annual regional targets</strong> for CY 2026. Enter one target value per indicator — not per quarter.</div>';
  SECTIONS.forEach(sec=>{
    html+=`<div class="sec-hd">${sec.label}</div>`;
    sec.groups.forEach(grp=>{
      html+=`<div class="sub-hd">${grp.label}</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px;margin-bottom:.5rem">`;
      grp.fields.forEach(f=>{
        const v=getT('RO','ANNUAL')[f.k];
        const dv=v!==null&&v!==undefined?v:'';
        html+=`<div class="efg" style="display:flex;flex-direction:column;gap:4px">
          <label style="font-size:11px;font-weight:500;color:var(--text2)">${f.lab}${f.pct?' (%)':''}</label>
          <input class="ta-input target" type="number" min="0" step="${f.pct?'0.01':'1'}" id="ro_${f.k}" value="${dv}" placeholder="—" style="text-align:right"/>
        </div>`;
      });
      html+=`</div>`;
    });
  });
  return html;
}

async function saveROTargets(){
  const btn=document.getElementById('btnROSave');
  const msg=document.getElementById('roMsg');
  btn.disabled=true; btn.textContent='Saving...'; msg.style.display='none';
  const rows=[];
  const now=new Date().toISOString();
  ALL_FIELDS.forEach(f=>{
    const el=document.getElementById('ro_'+f.k);
    if(el&&el.value!=='')rows.push({sdo_code:'RO',quarter:'ANNUAL',field_key:f.k,field_value:parseFloat(el.value),updated_at:now});
  });
  try{
    await sbUpsert('bar1_targets',rows);
    rows.forEach(r=>setCache(TARGET_CACHE,'RO','ANNUAL',r.field_key,r.field_value));
    msg.className='save-msg msg-ok'; msg.textContent='✓ RO Annual Targets saved to cloud!';
  }catch(e){
    msg.className='save-msg msg-err'; msg.textContent='✗ Save failed. Check connection.';
  }
  msg.style.display='block';
  btn.disabled=false; btn.textContent='☁️ Save RO Annual Targets';
  setTimeout(()=>msg.style.display='none',4000);
}

// ─── SDO DETAIL ──────────────────────────────
function viewSDO(code){adminSDO=code;showSDODetail(code);}
function showSDODetail(code){
  const sdo=SDO_LIST.find(s=>s.code===code);
  if(!sdo)return;
  let html=`<div style="margin-top:1rem;font-size:15px;font-weight:600;margin-bottom:1rem">${sdo.name} — Submitted Data</div>`;
  SECTIONS.forEach(sec=>{
    html+=`<div class="card"><div class="card-title">${sec.label}</div><div class="tbl-wrap"><table>
      <thead><tr><th>Indicator</th>
      ${QUARTERS.map(q=>`<th class="th-target num">${q} Target</th><th class="th-accomplish num">${q} Acc.</th><th class="th-variance num">${q} Var.</th>`).join('')}
      </tr></thead><tbody>`;
    sec.groups.forEach(grp=>{
      html+=`<tr><td colspan="${1+QUARTERS.length*3}" style="background:var(--surface2);font-size:11px;font-weight:600;color:var(--text2);padding:5px 10px">${grp.label}</td></tr>`;
      grp.fields.forEach(f=>{
        html+=`<tr><td>${f.lab}${f.pct?' (%)':''}</td>`;
        QUARTERS.forEach(q=>{
          const t=getT(code,q)[f.k]; const a=getD(code,q)[f.k];
          const td=(t===null||t===undefined)?'—':(f.pct?Number(t).toFixed(1)+'%':Number(t).toLocaleString());
          const ad=(a===null||a===undefined)?'—':(f.pct?Number(a).toFixed(1)+'%':Number(a).toLocaleString());
          let vd='—',vcls='variance-cell';
          if(t!==null&&t!==undefined&&a!==null&&a!==undefined){
            const v=Number(a)-Number(t);
            vd=(f.pct?v.toFixed(1)+'%':v.toLocaleString());
            vcls='variance-cell '+(v>=0?'var-pos':'var-neg');
          }
          html+=`<td class="target-cell">${td}</td><td class="accomplish-cell">${ad}</td><td class="${vcls}">${vd}</td>`;
        });
        html+=`</tr>`;
      });
    });
    html+=`</tbody></table></div></div>`;
  });
  const el=document.getElementById('sdoDetail');
  if(el)el.innerHTML=html;
}

// ─── CONSOLIDATED ────────────────────────────
function buildConsolidated(){
  const kf=[
    {k:'teachers_trained',lab:'Teachers trained'},
    {k:'trp_trained',lab:'Teaching-related trained'},
    {k:'ntp_trained',lab:'Non-teaching trained'},
    {k:'total_schools_lac',lab:'Schools with LAC'},
    {k:'classrooms_constructed',lab:'Classrooms constructed'},
    {k:'classrooms_ongoing',lab:'Classrooms on-going'},
    {k:'berf_approved',lab:'BERF proposals approved'},
    {k:'sci_math_equip',lab:'Sci/Math equipment'},
    {k:'tvl_equip',lab:'TVL equipment'},
    {k:'ict_equip',lab:'ICT equipment'},
    {k:'hot_meals',lab:'SBFP Hot Meals'},
    {k:'esc_grantees',lab:'ESC grantees'},
    {k:'nat_elem',lab:'NAT Elem Grade 6 (%)'},
    {k:'nat_jhs',lab:'NAT JHS Grade 10 (%)'},
    {k:'nat_shs',lab:'NAT SHS Grade 12 (%)'},
    {k:'retention_elem',lab:'Retention Rate — Elem (%)'},
    {k:'completion_elem',lab:'Completion Rate — Elem (%)'},
  ];
  let html=`<div class="card"><div class="card-title">Consolidated BAR 1 Accomplishments — All 12 SDOs · CY 2026</div>
    <div class="tbl-wrap"><table>
    <thead><tr><th>Indicator</th>${SDO_LIST.map(s=>`<th class="num" style="min-width:60px">${s.code}</th>`).join('')}<th class="num" style="color:var(--accent)">TOTAL</th></tr></thead><tbody>`;
  QUARTERS.forEach(q=>{
    html+=`<tr><td colspan="${SDO_LIST.length+2}" style="background:var(--accent);color:#fff;font-weight:600;padding:5px 10px;font-size:11px">${q} — CY 2026</td></tr>`;
    kf.forEach(f=>{
      let reg=0;
      const cells=SDO_LIST.map(s=>{
        const v=getD(s.code,q)[f.k];
        if(v!==null&&v!==undefined)reg+=Number(v);
        return`<td class="num">${(v===null||v===undefined)?'—':Number(v).toLocaleString()}</td>`;
      }).join('');
      html+=`<tr><td style="padding-left:14px">${f.lab}</td>${cells}<td class="num" style="font-weight:700;color:var(--accent)">${reg>0?reg.toLocaleString():'—'}</td></tr>`;
    });
  });
  html+=`</tbody></table></div></div>`;
  return html;
}

// ─── ALL PDFS ────────────────────────────────
function buildAllPDFs(){
  let html='<div class="alert alert-info">All BAR 1 PDF files uploaded by the 12 SDOs.</div>';
  SDO_LIST.forEach(s=>{
    const allUploads=QUARTERS.flatMap(q=>getU(s.code,q).map(u=>({...u,q})));
    if(allUploads.length===0)return;
    html+=`<div class="card"><div class="card-title">${s.name}</div><div class="upload-list">`;
    allUploads.forEach(u=>{
      html+=`<div class="upload-item">
        <div><a href="${u.file_path}" target="_blank">📄 ${u.file_name}</a>
        <div class="upload-time">${u.q} &nbsp;·&nbsp; Uploaded: ${new Date(u.uploaded_at).toLocaleString()}</div></div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  if(html.indexOf('<div class="card">')===-1)
    html+='<div class="alert alert-warn">No PDF files uploaded yet by any SDO.</div>';
  return html;
}

// ─── EDIT SDO DATA ───────────────────────────
function loadEdit(){
  const sdo=document.getElementById('eSdo')?.value;
  const q=document.getElementById('eQ')?.value;
  if(!sdo||!q)return;
  const sdoObj=SDO_LIST.find(s=>s.code===sdo);
  document.getElementById('editForm').innerHTML=`
    <div class="card" style="margin-top:1rem">
      <div class="card-title">Editing: ${sdoObj.name} — ${q} CY 2026</div>
      <div class="legend-row">
        <span><span class="ldot" style="background:#fffbf0;border:1px solid #e8d5a0"></span>Target</span>
        <span><span class="ldot" style="background:#f0f9f5;border:1px solid #a8d5c0"></span>Accomplishment</span>
      </div>
      ${buildFormHTML(sdo,q,'edit_',false)}
      <button class="btn-save" id="btnEdit" onclick="doAdminSave()">☁️ Save Changes — ${sdoObj.name} ${q}</button>
      <div class="save-msg" id="eSaveMsg"></div>
    </div>`;
}

async function doAdminSave(){
  const sdo=document.getElementById('eSdo').value;
  const q=document.getElementById('eQ').value;
  const btn=document.getElementById('btnEdit');
  const msg=document.getElementById('eSaveMsg');
  btn.disabled=true; btn.textContent='Saving...';
  const accRows=[],tgtRows=[];
  const now=new Date().toISOString();
  ALL_FIELDS.forEach(f=>{
    const ta=document.getElementById('edit_t_'+f.k);
    const aa=document.getElementById('edit_a_'+f.k);
    if(ta&&ta.value!=='')tgtRows.push({sdo_code:sdo,quarter:q,field_key:f.k,field_value:parseFloat(ta.value),updated_at:now});
    if(aa&&aa.value!=='')accRows.push({sdo_code:sdo,quarter:q,field_key:f.k,field_value:parseFloat(aa.value),updated_at:now});
  });
  try{
    if(tgtRows.length)await sbUpsert('bar1_targets',tgtRows);
    if(accRows.length)await sbUpsert('bar1_data',accRows);
    tgtRows.forEach(r=>setCache(TARGET_CACHE,sdo,q,r.field_key,r.field_value));
    accRows.forEach(r=>setCache(DATA_CACHE,sdo,q,r.field_key,r.field_value));
    msg.className='save-msg msg-ok'; msg.textContent='✓ Changes saved to cloud!';
  }catch(e){
    msg.className='save-msg msg-err'; msg.textContent='✗ Save failed.';
  }
  msg.style.display='block';
  const sdoObj=SDO_LIST.find(s=>s.code===sdo);
  btn.disabled=false; btn.textContent=`☁️ Save Changes — ${sdoObj.name} ${q}`;
  setTimeout(()=>msg.style.display='none',4000);
}
</script>
