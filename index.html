async function sb(table, method='GET', body=null, params=''){
  const url = `${SUPABASE_URL}/rest/v1/${table}${params}`;
  const opts = {
    method,
    headers:{
      'apikey':SUPABASE_KEY,
      'Authorization':'Bearer '+SUPABASE_KEY,
      'Content-Type':'application/json',
      'Prefer': method==='POST'?'return=representation,resolution=merge-duplicates':'return=representation'
    }
  };
  if(body) opts.body=JSON.stringify(body);
  const r = await fetch(url, opts);
  if(method==='DELETE'||r.status===204) return [];
  return r.json();
}

async function sbUpsert(table, data){
  return sb(table,'POST',data,'');

async function sbGet(table, params=''){

async function sbDelete(table, params){

function loadPage(page){
  currentPage=page;
  const nav=document.getElementById('navItems');
  nav.querySelectorAll('.nav-item').forEach(el=>{
    const txt=el.textContent.trim();
    const map={dashboard:'Dashboard',consolidated:'Consolidated',submissions:'SDO Submissions',remarks:'Consolidated Remarks',ro_targets:'RO Annual Targets',encoding_ctrl:'Encoding Control',pdf_ctrl:'PDF Upload Control',correction_admin:'Correction Requests',encode:'Encode Data',my_summary:'My Summary',regional:'Regional Totals',pdf_upload:'Upload PDF'};
    if(txt.includes(map[page]||'__')) el.classList.add('active');
    else el.classList.remove('active');
  });
  const pages={
    dashboard:renderDashboard,
    consolidated:renderConsolidated,
    submissions:renderSubmissions,
    remarks:renderRemarks,
    ro_targets:renderROTargets,
    encoding_ctrl:renderEncodingCtrl,
    pdf_ctrl:renderPDFCtrl,
    correction_admin:renderCorrectionAdmin,
    encode:renderEncode,
    my_summary:renderMySummary,
    regional:renderRegional,
    pdf_upload:renderPDFUpload
  };
  if(pages[page]) pages[page]();
}

async function saveROTargets(){
  const msg=document.getElementById('roMsg');
  msg.style.display='none';
  
  const upsertData=[];
  const assignData=[];
  
  ALL_INDICATORS.forEach(ind=>{
    const qEl=document.getElementById(`qa_${ind.key}`);
    const valEl=document.getElementById(`rot_${ind.key}`);
    if(!qEl||!valEl) return;
    const q=qEl.value;
    const val=parseFloat(valEl.value)||0;
    
    // Save assignment
    if(q){
      assignData.push({indicator_key:ind.key, quarter:q});
    }
    
    // Save target for the assigned quarter
    if(q && val>0){
      upsertData.push({sdo_code:'RO', quarter:q, field_key:ind.key, field_value:val});
    }
  });

  try{
    // Delete all existing assignments first
    await sbDelete('bar1_quarter_assignments','?indicator_key=not.eq.__none__');
    
    // Insert new assignments
    if(assignData.length>0){
      await fetch(`${SUPABASE_URL}/rest/v1/bar1_quarter_assignments`,{
        method:'POST',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
        body:JSON.stringify(assignData)
      });
    }
    
    // Save targets
    if(upsertData.length>0){
      await fetch(`${SUPABASE_URL}/rest/v1/bar1_targets`,{
        method:'POST',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
        body:JSON.stringify(upsertData)
      });
    }
    
    // Reload
    await loadQuarterAssignments();
    msg.textContent='✓ Targets and quarter assignments saved successfully!';
    msg.className='msg msg-success';
    msg.style.display='block';
    setTimeout(()=>msg.style.display='none',4000);
  }catch(e){
    msg.textContent='❌ Error saving: '+e.message;
    msg.className='msg msg-error';
    msg.style.display='block';
  }
}

async function renderEncode(){

  await Promise.all([loadQuarterAssignments(), loadEncodingControl()]);
  await loadCorrectionRequests(currentUser.username);
  
  const myData=await sbGet('bar1_data',`?sdo_code=eq.${currentUser.username}`);
  const myTargets=await sbGet('bar1_targets',`?sdo_code=eq.${currentUser.username}`);
  const myRemarks=await sbGet('bar1_remarks',`?sdo_code=eq.${currentUser.username}`);
  
  const dataMap={};(myData||[]).forEach(r=>{dataMap[`${r.quarter}_${r.field_key}`]=r.field_value;});
  const targetMap={};(myTargets||[]).forEach(r=>{targetMap[`${r.quarter}_${r.field_key}`]=r.field_value;});
  const remarkMap={};(myRemarks||[]).forEach(r=>{remarkMap[`${r.quarter}_${r.field_key}`]=r.remark_text;});
  
  let activeQ='Q1';
  
  function buildEncodeHTML(q){
    const isOpen=encodingControl[q]||false;
    const assignedInds=getIndicatorsForQuarter(q);
    
    let h=`<div class="msg" id="encMsg"></div>`;
    
    if(!isOpen){
      h+=`<div class="msg msg-info" style="display:block">🔒 Encoding for <strong>${q}</strong> is currently <strong>CLOSED</strong> by the Administrator. You may view your previously submitted data below (read-only).</div>`;
    } else {
      h+=`<div class="msg msg-success" style="display:block">✅ Encoding for <strong>${q}</strong> is <strong>OPEN</strong>. Only indicators assigned to <strong>${q}</strong> by the Administrator are enabled.</div>`;
    }
    
    if(assignedInds.length===0){
      h+=`<div class="card"><div class="empty">No indicators have been assigned to <strong>${q}</strong> yet by the Administrator.</div></div>`;
    }
    
    PROGRAMS.forEach(prog=>{
      const progInds=ALL_INDICATORS.filter(i=>i.prog===prog.key);
      if(!progInds.length) return;
      h+=`<div class="prog-header">${prog.name}</div><div class="prog-body">`;
      
      prog.sections.forEach(sec=>{
        h+=`<div class="ind-sub" style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:6px">${sec.title}</div>`;
        sec.indicators.forEach(ind=>{
          const isAssigned=quarterAssignments[ind.key]===q;
          const canEdit=isOpen && isAssigned;
          const corrKey=`${currentUser.username}_${q}_${ind.key}`;
          const corrStatus=correctionRequests[corrKey]?.status;
          const corrId=correctionRequests[corrKey]?.id;
          const corrApproved=corrStatus==='approved';
          const canEditWithCorr=canEdit||corrApproved;
          
          const tVal=targetMap[`${q}_${ind.key}`]||'';
          const aVal=dataMap[`${q}_${ind.key}`]||'';
          const rVal=remarkMap[`${q}_${ind.key}`]||'';
          
          const disabledAttr=canEditWithCorr?'':'disabled';
          const notAssignedNote=!isAssigned?`<span style="font-size:11px;color:var(--muted);margin-left:8px">⬤ Not assigned to ${q}</span>`:'';
          
          h+=`<div class="ind-group" style="${!isAssigned?'opacity:0.5':''}">
            <div class="ind-label">${ind.label}${notAssignedNote}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px">
              <div class="form-group">
                <label>SDO Target</label>
                <input type="number" id="tgt_${q}_${ind.key}" value="${tVal}" min="0" ${disabledAttr} placeholder="0">
              </div>
              <div class="form-group">
                <label>Accomplishment</label>
                <input type="number" id="acc_${q}_${ind.key}" value="${aVal}" min="0" ${disabledAttr} placeholder="0">
              </div>
            </div>
            <div class="remark-box">
              <div class="remark-label">💬 Remarks / Explanation</div>
              <textarea id="rmk_${q}_${ind.key}" ${disabledAttr} placeholder="Enter remarks or explanation for this indicator…">${rVal}</textarea>
            </div>
            ${isAssigned&&!canEdit&&!corrApproved?`
              <div style="margin-top:6px">
                ${corrStatus==='pending'?`<span class="badge badge-pending">Correction Request: PENDING admin approval</span>`:''}
                ${!corrStatus?`<button class="correction-btn" onclick="requestCorrection('${q}','${ind.key}')">🔁 Request Correction</button>`:''}
                ${corrStatus==='denied'?`<span class="badge badge-below">Correction Request: DENIED</span>`:''}
              </div>
            `:''}
          </div>`;
        });
      });
      h+=`</div>`;
    });
    
    if(isOpen || Object.values(correctionRequests).some(c=>c.status==='approved')){
      h+=`<div style="margin-top:16px"><button class="btn btn-primary" onclick="saveEncodeData('${q}')">☁️ Save ${q} Data to Cloud</button></div>`;
    }
    return h;
  }
  
  let html=`<div class="page-title">✏️ Encode Data</div>
  <div class="page-sub">${currentUser.name} — Enter targets and accomplishments per indicator</div>
  <div class="q-tabs">
    <button class="q-tab active" id="qtab_Q1" onclick="switchEncodeQ('Q1')">Q1</button>
    <button class="q-tab" id="qtab_Q2" onclick="switchEncodeQ('Q2')">Q2</button>
    <button class="q-tab" id="qtab_Q3" onclick="switchEncodeQ('Q3')">Q3</button>
    <button class="q-tab" id="qtab_Q4" onclick="switchEncodeQ('Q4')">Q4</button>
  </div>
  <div id="encodeBody">${buildEncodeHTML('Q1')}</div>`;
  
  mc.innerHTML=html;
  
  window.switchEncodeQ=function(q){
    document.querySelectorAll('.q-tab').forEach(t=>t.classList.remove('active'));
    const tab=document.getElementById(`qtab_${q}`);
    if(tab) tab.classList.add('active');
    document.getElementById('encodeBody').innerHTML=buildEncodeHTML(q);
  };
}

async function requestCorrection(q, fieldKey){
  const corrKey=`${currentUser.username}_${q}_${fieldKey}`;
  if(correctionRequests[corrKey]) return;
  
  await fetch(`${SUPABASE_URL}/rest/v1/bar1_correction_requests`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify({sdo_code:currentUser.username, quarter:q, field_key:fieldKey, status:'pending'})
  });
  
  await loadCorrectionRequests(currentUser.username);
  // Refresh current tab
  const activeTab=document.querySelector('.q-tab.active');
  if(activeTab) window.switchEncodeQ(activeTab.textContent.trim());
}

async function saveEncodeData(q){
  const msg=document.getElementById('encMsg');
  msg.style.display='none';
  
  const dataRows=[], targetRows=[], remarkRows=[];
  
  ALL_INDICATORS.forEach(ind=>{
    const isAssigned=quarterAssignments[ind.key]===q;
    const corrKey=`${currentUser.username}_${q}_${ind.key}`;
    const corrApproved=correctionRequests[corrKey]?.status==='approved';
    const isOpen=encodingControl[q]||false;
    if(!isOpen && !corrApproved) return; // skip closed non-approved
    
    const tEl=document.getElementById(`tgt_${q}_${ind.key}`);
    const aEl=document.getElementById(`acc_${q}_${ind.key}`);
    const rEl=document.getElementById(`rmk_${q}_${ind.key}`);
    
    if(tEl&&tEl.value!==''){
      targetRows.push({sdo_code:currentUser.username,quarter:q,field_key:ind.key,field_value:parseFloat(tEl.value)||0});
    }
    if(aEl&&aEl.value!==''){
      dataRows.push({sdo_code:currentUser.username,quarter:q,field_key:ind.key,field_value:parseFloat(aEl.value)||0});
    }
    if(rEl&&rEl.value.trim()){
      remarkRows.push({sdo_code:currentUser.username,quarter:q,field_key:ind.key,remark_text:rEl.value.trim()});
    }
  });
  
  try{
    const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'};
    if(dataRows.length) await fetch(`${SUPABASE_URL}/rest/v1/bar1_data`,{method:'POST',headers,body:JSON.stringify(dataRows)});
    if(targetRows.length) await fetch(`${SUPABASE_URL}/rest/v1/bar1_targets`,{method:'POST',headers,body:JSON.stringify(targetRows)});
    if(remarkRows.length) await fetch(`${SUPABASE_URL}/rest/v1/bar1_remarks`,{method:'POST',headers,body:JSON.stringify(remarkRows)});
    
    msg.textContent='✓ Data saved to cloud successfully!';
    msg.className='msg msg-success';
    msg.style.display='block';
    setTimeout(()=>msg.style.display='none',4000);
  }catch(e){
    msg.textContent='❌ Error saving: '+e.message;
    msg.className='msg msg-error';
    msg.style.display='block';
  }
}

async function uploadPDF(q){
  const fileInput=document.getElementById(`pdfFile_${q}`);
  const msg=document.getElementById(`pdfMsg_${q}`);
  if(!fileInput.files.length){alert('Please select a PDF file.');return;}
  msg.textContent='Uploading…';msg.className='msg msg-info';msg.style.display='block';
  
  for(const file of fileInput.files){
    const path=`${currentUser.username}/${q}/${Date.now()}_${file.name}`;
    const r=await fetch(`${SUPABASE_URL}/storage/v1/object/bar1-uploads/${path}`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/pdf'},
      body:file
    });
    if(r.ok){
      await fetch(`${SUPABASE_URL}/rest/v1/bar1_uploads`,{
        method:'POST',
        headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({sdo_code:currentUser.username,quarter:q,file_name:file.name,file_path:path})
      });
    }
  }
  msg.textContent='✓ PDF(s) uploaded successfully!';msg.className='msg msg-success';
}

async function renderConsolidated(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML=`<div class="page-title">📋 Consolidated Table</div><div class="loading">Loading…</div>`;
  await loadQuarterAssignments();
  
  const [allData, roData]=await Promise.all([
    sbGet('bar1_data'),
    sbGet('bar1_targets','?sdo_code=eq.RO')
  ]);
  
  const dataMap={};(allData||[]).forEach(r=>{dataMap[`${r.sdo_code}_${r.quarter}_${r.field_key}`]=r.field_value;});
  const roMap={};(roData||[]).forEach(r=>{roMap[`${r.quarter}_${r.field_key}`]=r.field_value;});
  
  let activeQ='Q1';
  
  function buildConsoTable(q){
    let h=`<div style="overflow-x:auto"><table style="min-width:1000px"><thead><tr>
      <th style="min-width:200px">Indicator</th>
      <th>RO Target</th>
      ${SDO_LIST.map(s=>`<th>${ACCOUNTS[s]?.name||s}</th>`).join('')}
      <th>Regional Total</th>
    </tr></thead><tbody>`;
    
    PROGRAMS.forEach(prog=>{
      h+=`<tr><td colspan="${SDO_LIST.length+3}" style="background:#e3f2fd;font-weight:700;color:#1565c0;font-size:12px">${prog.name}</td></tr>`;
      ALL_INDICATORS.filter(i=>i.prog===prog.key).forEach(ind=>{
        const roT=roMap[`${q}_${ind.key}`];
        const total=SDO_LIST.reduce((s,sdo)=>s+(dataMap[`${sdo}_${q}_${ind.key}`]||0),0);
        h+=`<tr>
          <td style="font-size:12px">${ind.label}</td>
          <td>${roT??'—'}</td>
          ${SDO_LIST.map(sdo=>`<td>${dataMap[`${sdo}_${q}_${ind.key}`]??'—'}</td>`).join('')}
          <td style="font-weight:700">${total||'—'}</td>
        </tr>`;
      });
    });
    h+=`</tbody></table></div>`;
    return h;
  }
  
  let html=`<div class="page-title">📋 Consolidated Table</div>
  <div class="q-tabs">
    ${['Q1','Q2','Q3','Q4'].map(q=>`<button class="q-tab ${q===activeQ?'active':''}" onclick="switchConsoQ('${q}')">${q}</button>`).join('')}
  </div>
  <div id="consoBody">${buildConsoTable('Q1')}</div>`;
  
  mc.innerHTML=html;
  window.switchConsoQ=function(q){
    document.querySelectorAll('.q-tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('consoBody').innerHTML=buildConsoTable(q);
  };
}

async function renderSubmissions(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML=`<div class="page-title">📁 SDO Submissions</div><div class="loading">Loading…</div>`;
  
  const allData=await sbGet('bar1_data');
  const submitted={};
  (allData||[]).forEach(r=>{
    if(!submitted[r.sdo_code]) submitted[r.sdo_code]=new Set();
    submitted[r.sdo_code].add(r.quarter);
  });
  
  let html=`<div class="page-title">📁 SDO Submissions</div><div class="page-sub">Overview of which SDOs have submitted data.</div><div class="sdo-grid">`;
  SDO_LIST.forEach(sdo=>{
    const qs=[...((submitted[sdo]||new Set()))].sort().join(', ');
    const hasData=submitted[sdo]&&submitted[sdo].size>0;
    html+=`<div class="sdo-card ${hasData?'has-data':''}" onclick="viewSDO('${sdo}')">
      <h4>${ACCOUNTS[sdo]?.name||sdo}</h4>
      <p>${hasData?'Submitted: '+qs:'No data submitted yet'}</p>
    </div>`;
  });
  html+=`</div><div id="sdoDetail"></div>`;
  mc.innerHTML=html;
  
  window.viewSDO=async function(sdo){
    const [d, t]=await Promise.all([
      sbGet('bar1_data',`?sdo_code=eq.${sdo}`),
      sbGet('bar1_targets',`?sdo_code=eq.${sdo}`)
    ]);
    const dm={};(d||[]).forEach(r=>{dm[`${r.quarter}_${r.field_key}`]=r.field_value;});
    const tm={};(t||[]).forEach(r=>{tm[`${r.quarter}_${r.field_key}`]=r.field_value;});
    
    let h=`<div class="card"><h3>${ACCOUNTS[sdo]?.name} — Detailed Data</h3>`;
    ['Q1','Q2','Q3','Q4'].forEach(q=>{
      const hasQ=ALL_INDICATORS.some(i=>dm[`${q}_${i.key}`]!==undefined);
      if(!hasQ) return;
      h+=`<h4 style="margin:12px 0 6px;color:var(--primary)">${q}</h4><table><thead><tr><th>Indicator</th><th>Target</th><th>Accomplishment</th></tr></thead><tbody>`;
      ALL_INDICATORS.forEach(ind=>{
        const tv=tm[`${q}_${ind.key}`];const av=dm[`${q}_${ind.key}`];
        if(tv===undefined&&av===undefined) return;
        h+=`<tr><td style="font-size:12px">${ind.label}</td><td>${tv??'—'}</td><td>${av??'—'}</td></tr>`;
      });
      h+=`</tbody></table>`;
    });
    h+=`</div>`;
    document.getElementById('sdoDetail').innerHTML=h;
    document.getElementById('sdoDetail').scrollIntoView({behavior:'smooth'});
  };
}

async function renderRemarks(){
  const mc=document.getElementById('mainContent');
  mc.innerHTML=`<div class="page-title">💬 Consolidated Remarks</div><div class="loading">Loading…</div>`;
  await loadQuarterAssignments();
  
  const allRemarks=await sbGet('bar1_remarks');
  
  if(!allRemarks||!allRemarks.length){
    mc.innerHTML=`<div class="page-title">💬 Consolidated Remarks</div><div class="card"><div class="empty">No remarks submitted yet.</div></div>`;
    return;
  }
  
  // Group by indicator
  const grouped={};
  allRemarks.forEach(r=>{
    const k=`${r.quarter}_${r.field_key}`;
    if(!grouped[k]) grouped[k]={quarter:r.quarter,field_key:r.field_key,remarks:[]};
    grouped[k].remarks.push({sdo:r.sdo_code,text:r.remark_text});
  });
  
  let html=`<div class="page-title">💬 Consolidated Remarks</div><div class="page-sub">All SDO remarks per indicator per quarter.</div>`;
  
  Object.values(grouped).forEach(g=>{
    const ind=ALL_INDICATORS.find(i=>i.key===g.field_key);
    html+=`<div class="card"><h3>${g.quarter} — ${ind?ind.label:g.field_key}</h3><table><thead><tr><th>SDO</th><th>Remark</th></tr></thead><tbody>`;
    g.remarks.forEach(r=>{
      html+=`<tr><td style="font-weight:700;font-size:12px">${ACCOUNTS[r.sdo]?.name||r.sdo}</td><td style="font-size:13px">${r.text}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  mc.innerHTML=html;
}
