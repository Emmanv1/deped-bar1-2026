@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.sidebar{display:none}.content{max-width:100vw;padding:14px}.kpi-grid{grid-template-columns:1fr 1fr}.chart-grid{grid-template-columns:1fr}}

// ---- DATA LAYER ----
async function fetchSDOData(sdo,quarter){
  const ck=cacheKey(sdo,quarter);
  if(dbCache[ck])return dbCache[ck];
  const{data:acc}=await db.from('bar1_data').select('*').eq('sdo_code',sdo).eq('quarter',quarter);
  const{data:tgt}=await db.from('bar1_targets').select('*').eq('sdo_code',sdo).eq('quarter',quarter);
  const map={};
  (tgt||[]).forEach(r=>{if(!map[r.field_key])map[r.field_key]={};map[r.field_key].target=r.field_value;});
  (acc||[]).forEach(r=>{if(!map[r.field_key])map[r.field_key]={};
    if(r.field_key==='__remark__'+r.field_key.replace('__remark__',''))map[r.field_key].remark=r.field_value;
    else map[r.field_key].acc=r.field_value;
  });
  // fetch remarks separately (stored with field_key prefix __rmk_<key>)
  const{data:rmk}=await db.from('bar1_data').select('*').eq('sdo_code',sdo).eq('quarter',quarter);
  (rmk||[]).forEach(r=>{
    if(r.field_key.startsWith('__rmk_')){
      const k=r.field_key.replace('__rmk_','');
      if(!map[k])map[k]={};
      map[k].remark=r.remark_text||r.field_value;
    }
  });
  dbCache[ck]=map;
  return map;
}

async function fetchRemarks(sdo,quarter){
  // remarks stored in bar1_remarks table
  const{data}=await db.from('bar1_remarks').select('*').eq('sdo_code',sdo).eq('quarter',quarter);
  const map={};
  (data||[]).forEach(r=>{map[r.field_key]=r.remark_text;});
  return map;
}

async function saveRemarks(sdo,quarter,remarksObj){
  const rows=Object.entries(remarksObj).filter(([,v])=>v&&v.trim()).map(([k,v])=>({
    sdo_code:sdo,quarter,field_key:k,remark_text:v.trim(),updated_at:new Date().toISOString()
  }));
  if(!rows.length)return{error:null};
  return await db.from('bar1_remarks').upsert(rows,{onConflict:'sdo_code,quarter,field_key'});
}

async function fetchROTargets(quarter){
  const{data}=await db.from('bar1_targets').select('*').eq('sdo_code','RO').eq('quarter',quarter);
  const map={};(data||[]).forEach(r=>{map[r.field_key]=r.field_value;});
  return map;
}

async function saveAllFields(sdo,quarter,vals){
  const tgtRows=[],accRows=[];
  for(const[key,{target,acc}]of Object.entries(vals)){
    if(target!==''&&target!==null&&target!==undefined)
      tgtRows.push({sdo_code:sdo,quarter,field_key:key,field_value:parseFloat(target)||0,updated_at:new Date().toISOString()});
    if(acc!==''&&acc!==null&&acc!==undefined)
      accRows.push({sdo_code:sdo,quarter,field_key:key,field_value:parseFloat(acc)||0,updated_at:new Date().toISOString()});
  }
  if(tgtRows.length)await db.from('bar1_targets').upsert(tgtRows,{onConflict:'sdo_code,quarter,field_key'});
  if(accRows.length)await db.from('bar1_data').upsert(accRows,{onConflict:'sdo_code,quarter,field_key'});
  delete dbCache[cacheKey(sdo,quarter)];
}

async function renderAdminDashboard(el){
  const qtr=currentQFilter;
  let allData={};
  for(const sdo of SDO_LIST){allData[sdo]=await fetchSDOData(sdo,qtr);}
  const roTargets=await fetchROTargets(qtr);

  function regTotal(key){return SDO_LIST.reduce((s,sdo)=>s+(allData[sdo]?.[key]?.acc||0),0);}
  function regAvg(key){const vals=SDO_LIST.map(s=>allData[s]?.[key]?.acc).filter(v=>v!=null);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;}
  function roTgt(key){return roTargets[key]??null;}

  const kpis=[
    {label:'Teachers Trained',val:(regTotal('ehrd_p1a')+regTotal('ehrd_p1b')).toLocaleString(),desc:'Teaching + related staff'},
    {label:'Non-Teaching Trained',val:regTotal('ehrd_p2').toLocaleString(),desc:'Non-teaching personnel'},
    {label:'Classrooms Constructed',val:regTotal('beip_p1a').toLocaleString(),desc:'New classrooms'},
    {label:'Avg Retention (Elem)',val:regAvg('sslp_o1a').toFixed(1)+'%',desc:'All SDOs average'},
    {label:'Avg Completion (Elem)',val:regAvg('sslp_o2a').toFixed(1)+'%',desc:'All SDOs average'},
    {label:'SLAC Schools',val:regAvg('ehrd_o1').toFixed(1)+'%',desc:'Avg schools conducting SLAC'},
  ];

  let h=`<div class="page-header"><div class="page-title">📊 Regional Dashboard</div><div class="page-sub">DepEd Region XIII · BAR 1 CY 2026</div></div>
  <div class="tab-bar">${QUARTERS.map(q=>`<button class="tab-btn ${q===qtr?'active':''}" onclick="setQFilter('${q}')">${q} 2026</button>`).join('')}</div>
  <div class="kpi-grid">${kpis.map(k=>`<div class="kpi-card"><div class="kpi-label">${k.label}</div><div class="kpi-val">${k.val}</div><div class="kpi-desc">${k.desc}</div></div>`).join('')}</div>`;

  // Charts: ONE bar per indicator = RO Target (single bar) vs Consolidated Accomplishment (single bar)
  for(const prog of PROGRAMS){
    h+=`<div class="card"><div class="card-head"><h3>${prog.label}</h3></div><div class="card-body">`;
    h+=`<div class="chart-grid">`;
    for(const sec of prog.sections){
      for(const item of sec.items){
        const pct=item.unit==='%';
        const regVal=pct?regAvg(item.key):regTotal(item.key);
        const roVal=roTgt(item.key);
        h+=`<div class="chart-card"><h4>${item.label}</h4><div class="chart-wrap"><canvas id="chart_${item.key}"></canvas></div></div>`;
      }
    }
    h+=`</div>`;
    // Summary table
    h+=`<div class="tbl-wrap"><table><thead><tr><th>Indicator</th><th>RO Target</th><th>Consolidated Accomplishment</th><th>Unit</th><th>Status</th></tr></thead><tbody>`;
    for(const sec of prog.sections){
      h+=`<tr class="${sec.type==='outcome'?'outcome-header':'output-header'}"><td colspan="5">${sec.type==='outcome'?'OUTCOME':'OUTPUT'} INDICATORS</td></tr>`;
      for(const item of sec.items){
        const pct=item.unit==='%';
        const regVal=pct?regAvg(item.key):regTotal(item.key);
        const roVal=roTgt(item.key);
        let status='—',statusClass='';
        if(roVal!==null&&regVal>0){if(regVal>=roVal){status='✓ Met';statusClass='badge-green';}else{status='✗ Below';statusClass='badge-red';}}
        h+=`<tr><td>${item.label}</td>
          <td class="mono">${roVal!=null?Number(roVal).toLocaleString():'—'}</td>
          <td class="mono"><strong>${regVal>0?regVal.toFixed(pct?1:0):'—'}</strong></td>
          <td>${item.unit}</td>
          <td>${statusClass?`<span class="badge ${statusClass}">${status}</span>`:status}</td></tr>`;
      }
    }
    h+=`</tbody></table></div></div></div>`;
  }
  el.innerHTML=h;

  // Draw charts: 2 bars only — RO Target and Consolidated Accomplishment
  for(const prog of PROGRAMS){
    for(const sec of prog.sections){
      for(const item of sec.items){
        const canvas=document.getElementById('chart_'+item.key);
        if(!canvas)continue;
        const pct=item.unit==='%';
        const regVal=pct?SDO_LIST.map(s=>allData[s]?.[item.key]?.acc).filter(v=>v!=null).reduce((a,b,_,arr)=>a+b/arr.length,0)
                        :SDO_LIST.reduce((s,sdo)=>s+(allData[sdo]?.[item.key]?.acc||0),0);
        const roVal=roTgt(item.key)??0;
        new Chart(canvas,{
          type:'bar',
          data:{
            labels:['RO Target','Consolidated Accomplishment'],
            datasets:[{
              data:[roVal,regVal],
              backgroundColor:['rgba(220,38,38,0.7)','rgba(26,86,219,0.75)'],
              borderColor:['#dc2626','#1a56db'],
              borderWidth:1.5,
              borderRadius:5
            }]
          },
          options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:false},
              tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y.toFixed(pct?1:0)}${item.unit==='%'?'%':''}`}}
            },
            scales:{
              x:{ticks:{font:{size:11},color:'#374151'}},
              y:{beginAtZero:true,ticks:{font:{size:10}}}
            }
          }
        });
      }
    }
  }
}

async function saveROTargets(qtr){
  const msg=document.getElementById('ro-save-msg');
  msg.innerHTML=`<div class="alert alert-info">Saving…</div>`;
  const rows=[];
  for(const p of PROGRAMS)for(const s of p.sections)for(const i of s.items){
    const v=document.getElementById('ro_'+i.key)?.value;
    if(v!=='')rows.push({sdo_code:'RO',quarter:qtr,field_key:i.key,field_value:parseFloat(v)||0,updated_at:new Date().toISOString()});
  }
  const{error}=await db.from('bar1_targets').upsert(rows,{onConflict:'sdo_code,quarter,field_key'});
  msg.innerHTML=error?`<div class="alert alert-error">Error: ${error.message}</div>`:`<div class="alert alert-success">✓ RO Targets for ${qtr} saved!</div>`;
  setTimeout(()=>msg.innerHTML='',3000);
}

async function loadEditForm(){
  const sdo=document.getElementById('editSDO').value;
  const qtr=document.getElementById('editQ').value;
  const area=document.getElementById('edit-form-area');
  area.innerHTML=`<div class="loading"><div class="spinner"></div></div>`;
  delete dbCache[cacheKey(sdo,qtr)];
  const existing=await fetchSDOData(sdo,qtr);
  const existingRmk=await fetchRemarks(sdo,qtr);
  let h=`<div id="edit-save-msg"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <strong>${SDO_NAMES[sdo]} – ${qtr}</strong>
    <button class="btn btn-success" onclick="saveEditForm('${sdo}','${qtr}')">💾 Save Changes</button>
  </div>`;
  for(const prog of PROGRAMS){
    h+=`<div class="prog-section-lbl">${prog.label}</div>`;
    for(const sec of prog.sections){
      h+=`<span class="indicator-type ${sec.type==='outcome'?'outcome-lbl':'output-lbl'}">${sec.type==='outcome'?'Outcome':'Output'}</span>`;
      for(const item of sec.items){
        const d=existing[item.key]||{};
        const rmk=existingRmk[item.key]||'';
        h+=`<div style="margin-bottom:10px;padding:10px;background:#fafafa;border-radius:6px;border:1px solid #e5e7eb">
          <div style="font-size:12px;color:#374151;margin-bottom:6px;font-weight:500">${item.label} <span style="color:#9ca3af">(${item.unit})</span></div>
          <div class="field-row">
            <div class="field-group target"><label>Target</label><input type="number" step="any" id="et_${item.key}" value="${d.target??''}"/></div>
            <div class="field-group accomplishment"><label>Accomplishment</label><input type="number" step="any" id="ea_${item.key}" value="${d.acc??''}"/></div>
          </div>
          <div style="margin-top:6px"><label style="font-size:11px;font-weight:600;color:#4f46e5;display:block;margin-bottom:3px">Remarks / Explanation</label>
          <textarea id="er_${item.key}" placeholder="SDO remarks for this indicator…" style="width:100%;border:1.5px solid #e0e7ff;border-radius:5px;padding:7px 10px;font-size:12px;font-family:var(--font);resize:vertical;min-height:50px">${escHtml(rmk)}</textarea></div>
        </div>`;
      }
    }

async function saveEditForm(sdo,qtr){
  const msg=document.getElementById('edit-save-msg');
  msg.innerHTML=`<div class="alert alert-info">Saving…</div>`;
  const vals={},remarksObj={};
  for(const p of PROGRAMS)for(const s of p.sections)for(const i of s.items){
    vals[i.key]={target:document.getElementById('et_'+i.key)?.value??'',acc:document.getElementById('ea_'+i.key)?.value??''};
    const r=document.getElementById('er_'+i.key)?.value??'';
    if(r.trim())remarksObj[i.key]=r.trim();
  }
  await saveAllFields(sdo,qtr,vals);
  await saveRemarks(sdo,qtr,remarksObj);
  msg.innerHTML=`<div class="alert alert-success">✓ Saved successfully!</div>`;
  setTimeout(()=>msg.innerHTML='',3000);
}

// ---- SDO ENCODE ----
async function renderSDOEncode(el){
  const sdo=currentUser.sdo;
  const qtr=currentQFilter;
  const encCtrl=await fetchEncodeControl();
  const isOpen=encCtrl[qtr];
  const existing=await fetchSDOData(sdo,qtr);
  const existingRmk=await fetchRemarks(sdo,qtr);

  let h=`<div class="page-header"><div class="page-title">📝 Encode Data</div><div class="page-sub">${SDO_NAMES[sdo]} · CY 2026</div></div>
  <div class="tab-bar">${QUARTERS.map(q=>`<button class="tab-btn ${q===qtr?'active':''}" onclick="setQFilter('${q}')">${q}</button>`).join('')}</div>`;

  if(!isOpen){
    h+=`<div class="locked-notice">🔒 The encoding window for <strong>${qtr} 2026</strong> is currently <strong>closed</strong>. Please wait for the Regional Office to open the encoding period. You may still view your previously submitted data below.</div>`;
    // Read-only summary
    if(Object.keys(existing).length){
      h+=`<div class="card"><div class="card-head"><h3>Submitted Data — ${qtr} 2026 (Read-only)</h3></div><div class="card-body">
      <div class="tbl-wrap"><table><thead><tr><th>Indicator</th><th>Target</th><th>Accomplishment</th><th>Remarks</th></tr></thead><tbody>`;
      for(const prog of PROGRAMS){
        h+=`<tr class="prog-header"><td colspan="4">${prog.label}</td></tr>`;
        for(const sec of prog.sections){
          h+=`<tr class="${sec.type==='outcome'?'outcome-header':'output-header'}"><td colspan="4">${sec.type==='outcome'?'OUTCOME':'OUTPUT'} INDICATORS</td></tr>`;
          for(const item of sec.items){
            const d=existing[item.key]||{};
            const rmk=existingRmk[item.key]||'';
            h+=`<tr><td>${item.label}</td><td class="mono">${d.target??'—'}</td><td class="mono">${d.acc??'—'}</td>
              <td style="max-width:200px">${rmk?`<div class="remark-box">${escHtml(rmk)}</div>`:'—'}</td></tr>`;
          }
        }
      }
      h+=`</tbody></table></div></div></div>`;
    }
    el.innerHTML=h;return;
  }

  h+=`<div id="encode-msg"></div>
  <div class="card"><div class="card-head"><h3>${sdo} – ${qtr} 2026 BAR 1 Data</h3>
    <button class="btn btn-success" onclick="saveEncodeForm('${sdo}','${qtr}')">☁️ Save ${qtr} Data to Cloud</button>
  </div><div class="card-body">
  <div class="field-header" style="max-width:440px;margin-bottom:8px">
    <span class="th-target">📌 Target</span><span class="th-acc">✅ Accomplishment</span>
  </div>`;

  for(const prog of PROGRAMS){
    h+=`<div class="prog-section-lbl">${prog.label}</div>`;
    for(const sec of prog.sections){
      h+=`<span class="indicator-type ${sec.type==='outcome'?'outcome-lbl':'output-lbl'}">${sec.type==='outcome'?'Outcome':'Output'} Indicators</span>`;
      for(const item of sec.items){
        const d=existing[item.key]||{};
        const rmk=existingRmk[item.key]||'';
        h+=`<div style="margin-bottom:12px;padding:10px;background:#fafafa;border-radius:6px;border:1px solid #e5e7eb">
          <div style="font-size:12px;color:#374151;margin-bottom:6px;font-weight:500">${item.label} <span style="color:#9ca3af">(${item.unit})</span></div>
          <div class="field-row">
            <div class="field-group target"><label>Target</label><input type="number" step="any" id="t_${item.key}" value="${d.target??''}" placeholder="0"/></div>
            <div class="field-group accomplishment"><label>Accomplishment</label><input type="number" step="any" id="a_${item.key}" value="${d.acc??''}" placeholder="0"/></div>
          </div>
          <div style="margin-top:6px"><label style="font-size:11px;font-weight:600;color:#4f46e5;display:block;margin-bottom:3px">💬 Remarks / Explanation</label>
          <textarea id="r_${item.key}" placeholder="Explain your accomplishment, challenges encountered, or other relevant information…" style="width:100%;border:1.5px solid #e0e7ff;border-radius:5px;padding:7px 10px;font-size:12px;font-family:var(--font);resize:vertical;min-height:52px;background:#f5f7ff">${escHtml(rmk)}</textarea></div>
        </div>`;
      }
    }
  }
  h+=`</div></div><div style="text-align:right;margin-top:8px">
    <button class="btn btn-success" onclick="saveEncodeForm('${sdo}','${qtr}')">☁️ Save ${qtr} Data to Cloud</button>
  </div>`;
  el.innerHTML=h;
}

async function saveEncodeForm(sdo,qtr){
  const msg=document.getElementById('encode-msg');
  msg.innerHTML=`<div class="alert alert-info">Saving to cloud…</div>`;
  const vals={},remarksObj={};
  for(const p of PROGRAMS)for(const s of p.sections)for(const i of s.items){
    vals[i.key]={target:document.getElementById('t_'+i.key)?.value??'',acc:document.getElementById('a_'+i.key)?.value??''};
    const r=document.getElementById('r_'+i.key)?.value??'';
    if(r.trim())remarksObj[i.key]=r.trim();
  }
  try{
    await saveAllFields(sdo,qtr,vals);
    await saveRemarks(sdo,qtr,remarksObj);
    msg.innerHTML=`<div class="alert alert-success">✓ Data saved to cloud successfully!</div>`;
  }catch(e){
    msg.innerHTML=`<div class="alert alert-error">Error saving. Please try again.</div>`;
  }
  setTimeout(()=>msg.innerHTML='',3000);
  window.scrollTo({top:0,behavior:'smooth'});
}

// ---- SDO SUMMARY ----
async function renderSDOSummary(el){
  const sdo=currentUser.sdo;
  const qtr=currentQFilter;
  const data=await fetchSDOData(sdo,qtr);
  const remarks=await fetchRemarks(sdo,qtr);
  let h=`<div class="page-header"><div class="page-title">📊 My Summary</div><div class="page-sub">${SDO_NAMES[sdo]}</div></div>
  <div class="tab-bar">${QUARTERS.map(q=>`<button class="tab-btn ${q===qtr?'active':''}" onclick="setQFilter('${q}')">${q}</button>`).join('')}</div>`;
  if(!Object.keys(data).length){h+=`<div class="alert alert-warning">No data encoded yet for ${qtr}.</div>`;el.innerHTML=h;return;}
  h+=`<div class="tbl-wrap"><table><thead><tr><th>Indicator</th><th>Target</th><th>Accomplishment</th><th>Variance</th><th>Status</th><th>Remarks</th></tr></thead><tbody>`;
  for(const prog of PROGRAMS){
    h+=`<tr class="prog-header"><td colspan="6">${prog.label}</td></tr>`;
    for(const sec of prog.sections){
      h+=`<tr class="${sec.type==='outcome'?'outcome-header':'output-header'}"><td colspan="6">${sec.type==='outcome'?'OUTCOME':'OUTPUT'} INDICATORS</td></tr>`;
      for(const item of sec.items){
        const d=data[item.key]||{};
        const t=d.target,a=d.acc;
        let vari='—',varCls='',status='—',stCls='';
        if(t!=null&&a!=null){const v=a-t;vari=(v>=0?'+':'')+v.toFixed(1);varCls=v>=0?'var-pos':'var-neg';if(v>=0){status='✓ Met';stCls='badge-green';}else{status='✗ Below';stCls='badge-red';}}
        const rmk=remarks[item.key]||'';
        h+=`<tr><td>${item.label}</td><td class="mono">${t??'—'}</td><td class="mono"><strong>${a??'—'}</strong></td>
          <td class="mono ${varCls}">${vari}</td>
          <td>${stCls?`<span class="badge ${stCls}">${status}</span>`:status}</td>
          <td style="max-width:200px">${rmk?`<div class="remark-box">${escHtml(rmk)}</div>`:'—'}</td></tr>`;
      }
    }
  }
  h+=`</tbody></table></div>`;
  el.innerHTML=h;
}

// ---- SDO REGIONAL TOTALS ----
async function renderSDORegional(el){
  const qtr=currentQFilter;
  let allData={};
  for(const sdo of SDO_LIST){allData[sdo]=await fetchSDOData(sdo,qtr);}
  let h=`<div class="page-header"><div class="page-title">🌏 Regional Totals</div><div class="page-sub">Aggregated data – individual SDO data not shown</div></div>
  <div class="tab-bar">${QUARTERS.map(q=>`<button class="tab-btn ${q===qtr?'active':''}" onclick="setQFilter('${q}')">${q}</button>`).join('')}</div>
  <div class="tbl-wrap"><table><thead><tr><th>Indicator</th><th>Unit</th><th>Regional Total/Avg</th></tr></thead><tbody>`;
  for(const prog of PROGRAMS){
    h+=`<tr class="prog-header"><td colspan="3">${prog.label}</td></tr>`;
    for(const sec of prog.sections){
      h+=`<tr class="${sec.type==='outcome'?'outcome-header':'output-header'}"><td colspan="3">${sec.type==='outcome'?'OUTCOME':'OUTPUT'} INDICATORS</td></tr>`;
      for(const item of sec.items){
        const pct=item.unit==='%';
        const nums=SDO_LIST.map(s=>allData[s]?.[item.key]?.acc).filter(v=>v!=null).map(Number);
        const regVal=nums.length?(pct?nums.reduce((a,b)=>a+b,0)/nums.length:nums.reduce((a,b)=>a+b,0)):null;
        h+=`<tr><td>${item.label}</td><td>${item.unit}</td><td class="mono"><strong>${regVal!=null?regVal.toFixed(pct?1:0):'—'}</strong></td></tr>`;
      }
    }
  }
  h+=`</tbody></table></div>`;
  el.innerHTML=h;
}

// ---- SDO PDF UPLOAD ----
async function renderSDOUpload(el){
  const sdo=currentUser.sdo;
  const ctrl=await fetchPDFControl();
  const uploads=await fetchPDFUploads();
  const myUploads=uploads.filter(u=>u.sdo_code===sdo);
  let h=`<div class="page-header"><div class="page-title">📎 Upload BAR 1 PDF</div><div class="page-sub">${SDO_NAMES[sdo]}</div></div>`;
  for(const q of QUARTERS){
    const open=ctrl[q];
    h+=`<div class="card"><div class="card-head"><h3>${q} 2026</h3><span class="badge ${open?'badge-green':'badge-amber'}">${open?'Upload Open':'Upload Closed'}</span></div><div class="card-body">`;
    if(!open){h+=`<div class="alert alert-warning">The admin has not yet opened the upload window for ${q}.</div>`;}
    else{
      h+=`<div id="upload-msg-${q}"></div>
      <label class="upload-zone" for="pdf-inp-${q}">
        <input type="file" id="pdf-inp-${q}" accept=".pdf" multiple/>
        <div style="font-size:24px;margin-bottom:8px">📄</div>
        <div style="font-weight:600;color:#374151">Click to select PDF files</div>
        <div id="pdf-names-${q}" style="font-size:12px;color:#6b7280;margin-top:4px">Approved BAR 1 for ${q} 2026</div>
      </label>
      <button class="btn btn-primary" style="margin-top:10px" onclick="uploadPDF('${sdo}','${q}')">⬆️ Upload Selected Files</button>`;
    }
    const qFiles=myUploads.filter(u=>u.quarter===q);
    if(qFiles.length){
      h+=`<div class="uploaded-list"><strong style="font-size:12px">Uploaded files:</strong>`;
      qFiles.forEach(f=>{
        const url=`${SUPA_URL}/storage/v1/object/public/bar1-uploads/${f.file_path}`;
        h+=`<div class="file-item"><a href="${url}" target="_blank">📄 ${f.file_name}</a><span style="color:#9ca3af;font-size:11px">${new Date(f.uploaded_at).toLocaleDateString()}</span></div>`;
      });
      h+=`</div>`;
    }
    h+=`</div></div>`;
  }
  el.innerHTML=h;
  for(const q of QUARTERS){
    const inp=document.getElementById(`pdf-inp-${q}`);
    if(inp)inp.addEventListener('change',()=>{
      const names=[...inp.files].map(f=>f.name).join(', ');
      const d=document.getElementById(`pdf-names-${q}`);
      if(d)d.textContent=names||`Approved BAR 1 for ${q} 2026`;
    });
  }
}
async function uploadPDF(sdo,quarter){
  const inp=document.getElementById(`pdf-inp-${quarter}`);
  const msg=document.getElementById(`upload-msg-${quarter}`);
  if(!inp||!inp.files.length){if(msg)msg.innerHTML=`<div class="alert alert-warning">Please select at least one PDF file.</div>`;return;}
  if(msg)msg.innerHTML=`<div class="alert alert-info">Uploading…</div>`;
  for(const file of inp.files){
    const path=`${sdo}/${quarter}/${Date.now()}_${file.name.replace(/\s+/g,'_')}`;
    const{error:upErr}=await db.storage.from('bar1-uploads').upload(path,file,{contentType:'application/pdf'});
    if(upErr){if(msg)msg.innerHTML=`<div class="alert alert-error">Upload error: ${upErr.message}</div>`;return;}
    await db.from('bar1_uploads').insert({sdo_code:sdo,quarter,file_name:file.name,file_path:path});
  }
  if(msg)msg.innerHTML=`<div class="alert alert-success">✓ PDF(s) uploaded successfully!</div>`;
  setTimeout(()=>navTo('sdo-upload'),1500);
}

// ---- HELPERS ----
function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none')doLogin();});
</script>
